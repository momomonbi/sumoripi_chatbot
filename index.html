    <div class="settings-container">
        <div class="glass-card" style="padding: 15px; margin-bottom: 15px;">
            <h3 style="margin-top:0; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:5px;">👤 プロフィール</h3>
            <div style="display:flex; gap:15px; align-items:center; margin-bottom:15px;">
                <img id="profile-icon-preview" src="" style="width:60px; height:60px; border-radius:50%; object-fit:cover; background:#ccc; border:2px solid var(--accent-color);">
                <input type="file" id="icon-upload-input" accept="image/*" style="display:none;" onchange="autoCropAndSaveIcon(this)">
                <button type="button" onclick="document.getElementById('icon-upload-input').click()" style="padding:8px 15px; background:rgba(128,128,128,0.1); font-weight:bold; border-radius:10px; color:var(--text-color);">写真を選ぶ</button>
            </div>
            <div class="form-group">
                <label>あなたの名前</label>
                <input type="text" id="setting-username" placeholder="名前を入力" onchange="appData.userName=this.value; saveData();">
            </div>
        </div>

        <div class="glass-card" style="padding: 15px; margin-bottom: 15px;">
            <h3 style="margin-top:0; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:5px;">🧠 AI 連携 (GPT API)</h3>
            <div class="form-group">
                <label>OpenAI APIキー (sk-...)</label>
                <input type="password" id="setting-openai-key" placeholder="APIキーを入力" onchange="appData.openAiKey=this.value; saveData();">
            </div>
        </div>

        <div class="glass-card" style="padding: 15px; margin-bottom: 15px;">
            <h3 style="margin-top:0; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:5px;">🎨 デザインと背景</h3>
            <div class="form-group">
                <label>テーマスキン</label>
                <select id="theme-selector" onchange="appData.theme=this.value; saveData(); applyTheme();">
                    <option value="default">クリアライト</option>
                    <option value="dark">ダークモード</option>
                    <option value="retro">レトロカフェ</option>
                    <option value="cute">かわいい（ピンク）</option>
                    <option value="glass">ガラス（透明感）</option>
                </select>
            </div>
            <div class="form-group">
                <label>背景画像（透かし）</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="file" id="bg-upload-input" accept="image/*" style="display:none;" onchange="handleBgUpload(this)">
                    <button type="button" onclick="document.getElementById('bg-upload-input').click()" style="padding:8px 15px; background:rgba(0,0,0,0.1); border-radius:10px; font-weight:bold; color:var(--text-color);">画像を選ぶ</button>
                    <button type="button" onclick="appData.bgImage=''; saveData(); applyTheme();" style="padding:8px 15px; background:rgba(244,67,54,0.1); color:#f44336; border-radius:10px; font-weight:bold;">消す</button>
                </div>
            </div>
            <div class="form-group">
                <label>背景画像の濃さ</label>
                <input type="range" id="bg-opacity" min="0" max="1" step="0.1" value="0.2" onchange="appData.bgOpacity=this.value; saveData(); applyTheme();">
            </div>
        </div>
        
        <button onclick="hardResetApp()" style="width:100%; padding:14px; background:rgba(244,67,54,0.1); color:#f44336; border:1px solid #f44336; border-radius:12px; font-weight:900;">全データを削除してリセット</button>
    </div>
</div>

<div id="connect-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--accent-color); text-align:center;">📡 接続・ルーム管理</h3>
        
        <div style="display:flex; gap:10px; margin-bottom:15px;">
            <button id="tab-btn-modal-contact" onclick="switchModalTab('contact')" style="flex:1; padding:8px; border-bottom:3px solid var(--accent-color); font-weight:bold; background:none; color:var(--text-color);">個別チャット</button>
            <button id="tab-btn-modal-room" onclick="switchModalTab('room')" style="flex:1; padding:8px; border-bottom:3px solid transparent; font-weight:bold; background:none; color:#888;">複数人ルーム</button>
        </div>

        <div id="modal-tab-contact">
            <div style="background:rgba(0,0,0,0.05); padding:10px; border-radius:10px; text-align:center; margin-bottom:15px;">
                <div style="font-size:0.8rem; font-weight:bold; color:#666;">あなたの個別ID</div>
                <div id="p2p-my-id-display" style="font-size:1.8rem; font-weight:900; letter-spacing:4px; color:var(--accent-color);">----</div>
            </div>
            <div style="display:flex; gap:8px; margin-bottom:20px;">
                <input type="text" id="p2p-target-id" placeholder="相手ID" style="width:90px; padding:12px 5px; border-radius:10px; border:2px solid rgba(128,128,128,0.3); font-weight:bold; font-size:1.1rem; text-align:center;" inputmode="numeric" maxlength="4">
                <button onclick="connectNewContact()" style="flex:1; background:var(--accent-color); color:white; font-weight:900; border-radius:10px;">新しく繋ぐ</button>
            </div>
            <h4 style="margin:0 0 10px 0; font-size:1rem; border-bottom:1px solid #eee; padding-bottom:5px;">履歴・連絡帳</h4>
            <div id="contacts-list" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
        </div>

        <div id="modal-tab-room" style="display:none;">
            <div style="background:rgba(156, 39, 176, 0.05); padding:10px; border-radius:10px; text-align:center; margin-bottom:15px;">
                <button onclick="createRoom()" style="width:100%; padding:12px; background:#9c27b0; color:white; font-weight:bold; border-radius:10px; margin-bottom:10px;">✨ 新しいルームを作成（ホストになる）</button>
                <div style="font-size:0.75rem; color:#666;">※ホストが退出するとルームは閉じられます。</div>
            </div>
            <div style="display:flex; gap:8px; margin-bottom:20px;">
                <input type="text" id="p2p-room-id" placeholder="ROOM-..." style="flex:1; padding:12px 10px; border-radius:10px; border:2px solid rgba(128,128,128,0.3); font-weight:bold; font-size:1rem;">
                <button onclick="joinRoom()" style="background:#4CAF50; color:white; font-weight:900; border-radius:10px; padding:0 15px;">入室</button>
            </div>
            <h4 style="margin:0 0 10px 0; font-size:1rem; border-bottom:1px solid #eee; padding-bottom:5px;">マイルーム履歴</h4>
            <div id="rooms-list" style="max-height:150px; overflow-y:auto; margin-bottom:15px;"></div>
        </div>

        <button onclick="closeConnectModal()" style="width:100%; padding:12px; background:rgba(0,0,0,0.1); color:#333; border-radius:10px; font-weight:bold;">閉じる</button>
    </div>
</div>

<div id="tree-manage-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 style="margin-top:0;">🌳 ツリー切替 / 管理</h3>
        <p style="font-size:0.8rem; color:#666; margin-bottom:15px;">表示したい話題の始まりを選択してください。</p>
        <div id="tree-manage-list" style="max-height:50vh; overflow-y:auto; margin-bottom:15px;"></div>
        <button onclick="document.getElementById('tree-manage-modal').style.display='none'" style="width:100%; padding:12px; background:rgba(0,0,0,0.1); border-radius:10px; font-weight:bold; color:#333;">閉じる</button>
    </div>
</div>

<script>
    const DB_NAME = 'NodeCanvasChatDB';
    const STORE_NAME = 'appState';
    const DB_VERSION = 1;

    let appData = { 
        theme: 'default', userName: 'Sumito', userIcon: '', openAiKey: '',
        bgImage: '', bgOpacity: 0.2,
        myP2pId: '', contacts: {}, rooms: {}
    };
    
    // 現在のチャットモード
    let activeChatMode = null; // 'contact' or 'room'
    let activeChatId = null;   // contactId or roomId

    let activeConnections = {}; 
    let activeRoomPeers = {}; // Room用の中継先Peerリスト { peerId: conn }
    let roomMembersInfo = {}; // Room内のユーザー情報 { peerId: {name, icon} }

    let targetPanCoords = null; 
    let linkingSourceId = null;
    let activeTreeRootId = null; 
    let currentAttachedFile = null; 
    let newMessages = []; // ミニマップ通知用
    
    // オフライン・リアルタイム検知用
    let heartbeatTimer = null;
    let connectionStatus = {};

    const viewStates = {
        canvas: { scale: 1, panX: -4000, panY: -4000, isDragging: false, startX: 0, startY: 0 },
        tree:   { scale: 1, panX: -4000, panY: -4000, isDragging: false, startX: 0, startY: 0 }
    };

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function loadData() {
        try {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const request = store.get('mainData');
            request.onsuccess = () => {
                if (request.result) appData = { ...appData, ...request.result };
                initializeApp();
            };
            request.onerror = () => initializeApp();
        } catch(e) { console.error("DB Load Error", e); initializeApp(); }
    }

    async function saveData() {
        try {
            const db = await initDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put(appData, 'mainData');
        } catch(e) { console.error("DB Save Error", e); }
    }

    function formatTime(ts) {
        const d = new Date(ts || Date.now());
        return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function initializeApp() {
        if (!appData.myP2pId) { appData.myP2pId = Math.floor(1000 + Math.random() * 9000).toString(); saveData(); }
        if (!appData.contacts) appData.contacts = {}; 
        if (!appData.rooms) appData.rooms = {}; 

        document.getElementById('setting-username').value = appData.userName;
        document.getElementById('setting-openai-key').value = appData.openAiKey || '';
        document.getElementById('theme-selector').value = appData.theme || 'default';
        document.getElementById('bg-opacity').value = appData.bgOpacity !== undefined ? appData.bgOpacity : 0.2;
        if(appData.userIcon) document.getElementById('profile-icon-preview').src = appData.userIcon;
        
        applyTheme();
        initP2P();
        initWorkspaces();
        startHeartbeat(); 
        
        const activeTab = document.querySelector('.tab.active');
        if(activeTab) {
            document.getElementById('tab-highlight').style.width = activeTab.offsetWidth + 'px';
            document.getElementById('tab-highlight').style.transform = `translateX(${activeTab.offsetLeft - 5}px)`;
        }
    }

    window.onload = loadData;

    // --- ユーティリティ ---
    function getActiveData() {
        if (activeChatMode === 'room' && activeChatId) {
            if (!appData.rooms[activeChatId]) appData.rooms[activeChatId] = { name: activeChatId, host: activeChatId.split('-')[1], canvasNodes: [], treeNodes: [] };
            return appData.rooms[activeChatId];
        } else if (activeChatMode === 'contact' && activeChatId) {
            if (!appData.contacts[activeChatId]) appData.contacts[activeChatId] = { name: "ID:"+activeChatId, icon: "", canvasNodes: [], treeNodes: [] };
            return appData.contacts[activeChatId];
        }
        return null;
    }

    // --- UI/テーマ ---
    let currentTab = 'canvas';
    
    function switchTab(id, tabElement) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        tabElement.classList.add('active');
        document.getElementById(id).classList.add('active');
        
        setTimeout(() => {
            const highlight = document.getElementById('tab-highlight');
            highlight.style.width = tabElement.offsetWidth + 'px';
            highlight.style.transform = `translateX(${tabElement.offsetLeft - 5}px)`;
        }, 30);

        currentTab = id.replace('tab-', '');
        
        document.getElementById('btn-clear-canvas').style.display = currentTab === 'canvas' && activeChatId ? 'block' : 'none';
        document.getElementById('btn-export-canvas').style.display = currentTab === 'canvas' && activeChatId ? 'block' : 'none';
        document.getElementById('btn-manage-tree').style.display = currentTab === 'tree' && activeChatId ? 'block' : 'none';
        
        if(currentTab === 'canvas' || currentTab === 'tree') {
            renderWorkspace(currentTab);
            updateMinimap(currentTab);
        }
    }

    function handleCanvasTabClick(tabEl) {
        if (tabEl.classList.contains('active') && activeChatId) {
            if(confirm("現在のトーク画面を閉じますか？\n(履歴は残ります)")) {
                activeChatId = null; activeChatMode = null; updateTabUI(); renderWorkspace(currentTab); 
            }
            return;
        }
        switchTab('tab-canvas', tabEl);
        if (!activeChatId) openConnectModal();
    }
    
    async function hardResetApp() { 
        if(confirm("全履歴を消去します。よろしいですか？")) { 
            try {
                const db = await initDB();
                const tx = db.transaction(STORE_NAME, 'readwrite');
                tx.objectStore(STORE_NAME).clear();
                tx.oncomplete = () => location.reload();
            } catch(e) { location.reload(); }
        } 
    }
    
    function autoResize(el) { el.style.height = 'auto'; el.style.height = (el.scrollHeight < 120 ? el.scrollHeight : 120) + 'px'; }
    function handleEnter(e, sendFunc) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFunc(); e.target.style.height = 'auto'; } }

    function applyTheme() {
        document.body.setAttribute('data-theme', appData.theme || 'default');
        const bgs = document.querySelectorAll('.workspace-bg');
        bgs.forEach(bg => {
            if(appData.bgImage) {
                bg.style.backgroundImage = `url(${appData.bgImage})`;
                bg.style.opacity = appData.bgOpacity !== undefined ? appData.bgOpacity : 0.2;
            } else {
                bg.style.backgroundImage = 'none';
            }
        });
    }

    function handleBgUpload(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            appData.bgImage = e.target.result; 
            saveData();
            applyTheme();
        };
        reader.readAsDataURL(input.files[0]);
        input.value = "";
    }

    function updateSummaryPanel(summaryText, space) {
        const panel = document.getElementById(`${space}-summary-panel`);
        if(!panel) return;
        if(!summaryText) {
            panel.querySelector('.ai-summary-text').innerHTML = "まだ話題がありません。";
            panel.style.display = activeChatId ? 'block' : 'none';
        } else {
            panel.style.display = 'block';
            panel.querySelector('.ai-summary-text').innerHTML = summaryText.replace(/\n/g, '<br>');
        }
        updateMinimap(space);
    }

    function updateTabUI() {
        const tabBtn = document.getElementById('tab-btn-canvas');
        if(activeChatId) {
            const d = getActiveData();
            if (activeChatMode === 'room') {
                tabBtn.innerHTML = `🌐 ルーム (${d.name || activeChatId})`; 
                tabBtn.classList.add('room-connected');
                tabBtn.classList.remove('offline', 'connected');
            } else {
                const isOnline = connectionStatus[activeChatId] && connectionStatus[activeChatId].isOnline;
                if (isOnline) {
                    tabBtn.innerHTML = `🟢 接続中 (${d.name})`; 
                    tabBtn.classList.add('connected');
                    tabBtn.classList.remove('offline', 'room-connected');
                } else {
                    tabBtn.innerHTML = `🔴 オフライン (${d.name})`; 
                    tabBtn.classList.add('offline');
                    tabBtn.classList.remove('connected', 'room-connected');
                }
            }
            
            document.getElementById('btn-clear-canvas').style.display = currentTab === 'canvas' ? 'block' : 'none';
            document.getElementById('btn-export-canvas').style.display = currentTab === 'canvas' ? 'block' : 'none';
            document.getElementById('btn-manage-tree').style.display = currentTab === 'tree' ? 'block' : 'none';
            
            if(currentTab === 'canvas') {
                updateSummaryPanel(d.canvasSummary, 'canvas');
            } else if (currentTab === 'tree' && activeTreeRootId) {
                const rNode = d.treeNodes.find(n => n.id === activeTreeRootId);
                updateSummaryPanel(rNode ? rNode.treeSummary : "", 'tree');
            }
            updateOnlineIndicator();
        } else {
            tabBtn.innerHTML = "🎨 キャンバス"; 
            tabBtn.classList.remove('connected', 'offline', 'room-connected');
            document.getElementById('btn-clear-canvas').style.display = 'none';
            document.getElementById('btn-export-canvas').style.display = 'none';
            document.getElementById('btn-manage-tree').style.display = 'none';
            document.querySelectorAll('.ai-summary-panel').forEach(el => el.style.display = 'none');
            document.getElementById('new-message-nav').style.display = 'none';
        }
        setTimeout(() => { if(tabBtn.classList.contains('active')) document.getElementById('tab-highlight').style.width = tabBtn.offsetWidth + 'px'; }, 50);
    }

    // --- P2P & ルーム接続ロジック ---
    let peer = null;

    function initP2P() {
        peer = new Peer("ncchat2-" + appData.myP2pId, { config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' } ] } });
        peer.on('connection', (connection) => {
            const targetId = connection.peer.replace("ncchat2-", "");
            setupP2PConnection(targetId, connection, false);
        });
    }

    function startHeartbeat() {
        if (heartbeatTimer) return;
        heartbeatTimer = setInterval(() => {
            const now = Date.now();
            // 個別コネクションの監視
            Object.keys(activeConnections).forEach(targetId => {
                const conn = activeConnections[targetId];
                const status = connectionStatus[targetId];
                if (conn && conn.open) {
                    conn.send({ type: 'ping' });
                    if (status && (now - status.lastPong > 10000)) {
                        if (status.isOnline) { status.isOnline = false; updateOnlineIndicator(); updateTabUI(); }
                    }
                } else {
                    if (status && status.isOnline) { status.isOnline = false; updateOnlineIndicator(); updateTabUI(); }
                }
            });
            // ルームメンバー（ホスト経由の参加者）の監視
            if (activeChatMode === 'room' && isHost(activeChatId)) {
                Object.keys(activeRoomPeers).forEach(peerId => {
                    const conn = activeRoomPeers[peerId];
                    if (conn && conn.open) conn.send({ type: 'ping' });
                    else delete activeRoomPeers[peerId];
                });
                broadcastRoomMembers(); // 参加者リストを定期更新して送信
            }
        }, 3000);
    }

    function switchModalTab(tab) {
        document.getElementById('tab-btn-modal-contact').style.borderBottomColor = tab === 'contact' ? 'var(--accent-color)' : 'transparent';
        document.getElementById('tab-btn-modal-contact').style.color = tab === 'contact' ? 'var(--text-color)' : '#888';
        document.getElementById('tab-btn-modal-room').style.borderBottomColor = tab === 'room' ? 'var(--accent-color)' : 'transparent';
        document.getElementById('tab-btn-modal-room').style.color = tab === 'room' ? 'var(--text-color)' : '#888';
        
        document.getElementById('modal-tab-contact').style.display = tab === 'contact' ? 'block' : 'none';
        document.getElementById('modal-tab-room').style.display = tab === 'room' ? 'block' : 'none';
    }

    function openConnectModal() {
        document.getElementById('p2p-my-id-display').innerText = appData.myP2pId;
        renderContactsList();
        renderRoomsList();
        document.getElementById('connect-modal').style.display = 'flex';
    }
    function closeConnectModal() { document.getElementById('connect-modal').style.display = 'none'; }

    function renderContactsList() {
        const list = document.getElementById('contacts-list'); list.innerHTML = '';
        Object.keys(appData.contacts).forEach(id => {
            const contact = appData.contacts[id];
            const isOnline = connectionStatus[id] && connectionStatus[id].isOnline;
            list.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:10px; background:rgba(0,0,0,0.03); border-radius:10px;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="${contact.icon || ''}" style="width:36px; height:36px; border-radius:50%; background:#ccc; object-fit:cover;">
                    <div><strong style="color:var(--accent-color);">${contact.name || 'ゲスト'}</strong> ${isOnline ? '<span style="color:#4CAF50; font-size:0.7rem;">(オンライン)</span>' : '<span style="color:#9e9e9e; font-size:0.7rem;">(オフライン)</span>'}</div>
                </div>
                <button onclick="openContactHistory('${id}')" style="padding:6px 12px; background:#2196F3; color:white; font-weight:bold; border-radius:10px;">繋ぐ</button>
            </div>`;
        });
    }

    function renderRoomsList() {
        const list = document.getElementById('rooms-list'); list.innerHTML = '';
        Object.keys(appData.rooms).forEach(id => {
            const room = appData.rooms[id];
            list.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding:10px; background:rgba(156,39,176,0.05); border-radius:10px;">
                <div><strong style="color:#9c27b0;">${room.name || id}</strong><br><span style="font-size:0.7rem; color:#666;">ID: ${id}</span></div>
                <button onclick="openRoomHistory('${id}')" style="padding:6px 12px; background:#9c27b0; color:white; font-weight:bold; border-radius:10px;">入室</button>
            </div>`;
        });
    }

    // --- 個別チャット処理 ---
    function connectNewContact() {
        const targetId = document.getElementById('p2p-target-id').value.trim();
        if(!targetId || targetId.length !== 4) return alert('4桁の数値を入力してください');
        if(targetId === appData.myP2pId) return alert('自分のIDです');
        openContactHistory(targetId);
    }

    function openContactHistory(targetId) {
        closeConnectModal();
        activeChatMode = 'contact';
        activeChatId = targetId; 
        
        // 切替時に不要なコネクションは維持しても良いが、UI状態をリセット
        roomMembersInfo = {};
        
        if(!appData.contacts[targetId]) { appData.contacts[targetId] = { name: "ID:"+targetId, icon: "", canvasNodes: [], treeNodes: [] }; saveData(); }
        if (!connectionStatus[targetId]) connectionStatus[targetId] = { lastPong: 0, isOnline: false };
        
        updateTabUI(); 
        renderWorkspace(currentTab);
        
        if (!activeConnections[targetId] || !activeConnections[targetId].open) {
            const conn = peer.connect("ncchat2-" + targetId, { reliable: true });
            setupP2PConnection(targetId, conn, true);
        }
    }

    // --- ルーム処理 ---
    function isHost(roomId) {
        return roomId && roomId.split('-')[1] === appData.myP2pId;
    }

    function createRoom() {
        const roomId = `ROOM-${appData.myP2pId}-${Math.floor(Math.random()*1000)}`;
        if(!appData.rooms[roomId]) {
            appData.rooms[roomId] = { name: "マイルーム", host: appData.myP2pId, canvasNodes: [], treeNodes: [] };
            saveData();
        }
        openRoomHistory(roomId);
    }

    function joinRoom() {
        const roomId = document.getElementById('p2p-room-id').value.trim();
        if(!roomId.startsWith('ROOM-')) return alert('ROOM- から始まる正しいIDを入力してください');
        openRoomHistory(roomId);
    }

    function openRoomHistory(roomId) {
        closeConnectModal();
        activeChatMode = 'room';
        activeChatId = roomId;
        
        if(!appData.rooms[roomId]) { appData.rooms[roomId] = { name: "参加ルーム", host: roomId.split('-')[1], canvasNodes: [], treeNodes: [] }; saveData(); }
        
        roomMembersInfo = {}; // 自身を追加
        roomMembersInfo[appData.myP2pId] = { name: appData.userName, icon: appData.userIcon };

        updateTabUI();
        renderWorkspace(currentTab);

        if (isHost(roomId)) {
            // 自分がホストなら他の人の接続を待つのみ
            updateOnlineIndicator();
        } else {
            // ホストへ接続
            const hostId = roomId.split('-')[1];
            if (!activeConnections[hostId] || !activeConnections[hostId].open) {
                const conn = peer.connect("ncchat2-" + hostId, { reliable: true });
                setupP2PConnection(hostId, conn, true, roomId);
            } else {
                // すでに接続済みの場合は入室を通知
                activeConnections[hostId].send({ type: 'join_room', roomId, userInfo: { name: appData.userName, icon: appData.userIcon } });
            }
        }
    }

    // --- 通信と同期 ---
    function setupP2PConnection(targetId, conn, isInitiator, joiningRoomId = null) {
        conn.on('open', () => {
            activeConnections[targetId] = conn;
            connectionStatus[targetId] = { lastPong: Date.now(), isOnline: true };
            
            // 通常の個別情報交換
            conn.send({ type: 'system_info', payload: { name: appData.userName, icon: appData.userIcon } });
            
            // ルーム参加の場合
            if (joiningRoomId) {
                conn.send({ type: 'join_room', roomId: joiningRoomId, userInfo: { name: appData.userName, icon: appData.userIcon } });
            } else if (activeChatMode === 'contact' && activeChatId === targetId) {
                initiateSync(targetId);
            }
            
            updateOnlineIndicator();
            if (activeChatMode === 'contact' && activeChatId === targetId) updateTabUI();
        });

        conn.on('data', async (data) => {
            // Ping / Pong
            if (data.type === 'ping') { conn.send({ type: 'pong' }); return; }
            if (data.type === 'pong') {
                if(connectionStatus[targetId]) {
                    connectionStatus[targetId].lastPong = Date.now();
                    if (!connectionStatus[targetId].isOnline) {
                        connectionStatus[targetId].isOnline = true;
                        if(activeChatMode === 'contact' && activeChatId === targetId) { updateOnlineIndicator(); updateTabUI(); initiateSync(targetId); }
                    }
                }
                return;
            }

            // ルーム関連処理 (ホスト側)
            if (data.type === 'join_room') {
                if (isHost(data.roomId)) {
                    activeRoomPeers[targetId] = conn; // クライアントを登録
                    roomMembersInfo[targetId] = data.userInfo;
                    // クライアントへ現在の部屋のデータを送信
                    const room = appData.rooms[data.roomId];
                    conn.send({ type: 'room_sync_full', roomId: data.roomId, payload: { canvasNodes: room.canvasNodes, treeNodes: room.treeNodes, members: roomMembersInfo } });
                    broadcastRoomMembers();
                    updateOnlineIndicator();
                }
                return;
            }
            // ルームメンバーリスト更新 (クライアント側)
            if (data.type === 'room_members_update') {
                if (activeChatMode === 'room' && activeChatId === data.roomId) {
                    roomMembersInfo = data.members;
                    updateOnlineIndicator();
                }
                return;
            }
            // ルーム全データ同期 (クライアント側)
            if (data.type === 'room_sync_full') {
                if (activeChatMode === 'room' && activeChatId === data.roomId) {
                    const room = appData.rooms[data.roomId];
                    room.canvasNodes = data.payload.canvasNodes;
                    room.treeNodes = data.payload.treeNodes;
                    roomMembersInfo = data.payload.members;
                    saveData();
                    renderWorkspace(currentTab);
                    updateOnlineIndicator();
                }
                return;
            }
            
            // 以下はノードデータ関連
            // ホストなら中継する
            if (data.roomId && isHost(data.roomId) && activeChatId === data.roomId) {
                broadcastToRoom(data, targetId); // 送信元以外にブロードキャスト
            }

            // 個別チャット、または自分が参加しているルームのデータ処理
            const dataTargetMode = data.roomId ? 'room' : 'contact';
            const dataTargetId = data.roomId ? data.roomId : targetId;
            const contextData = dataTargetMode === 'room' ? appData.rooms[dataTargetId] : appData.contacts[dataTargetId];
            
            if(!contextData) return;

            if (data.type === 'system_info') {
                if(dataTargetMode === 'contact') {
                    contextData.name = data.payload.name;
                    if(data.payload.icon) contextData.icon = data.payload.icon;
                    saveData(); updateOnlineIndicator();
                    if(activeChatId === targetId) updateTabUI();
                }
            } else if (data.type === 'new_node') {
                const { space, node } = data.payload;
                node.isMine = false;
                contextData[`${space}Nodes`].push(node);
                saveData();
                if (activeChatId === dataTargetId) {
                    newMessages.push(node.id); // 新着通知用
                    renderWorkspace(currentTab);
                    if (currentTab === space) {
                        const vs = viewStates[space];
                        const cont = document.getElementById(`${space}-workspace`);
                        const screenX = ((node.x) * vs.scale) + vs.panX;
                        const screenY = ((node.y) * vs.scale) + vs.panY;
                        if (screenX < 0 || screenX > cont.offsetWidth || screenY < 0 || screenY > cont.offsetHeight) {
                            showNewMessageNav(node.x, node.y, space);
                        }
                    }
                }
            } else if (data.type === 'update_node') {
                const { space, node } = data.payload;
                const idx = contextData[`${space}Nodes`].findIndex(n => n.id === node.id);
                if(idx !== -1) {
                    node.isMine = false; 
                    contextData[`${space}Nodes`][idx] = node;
                    saveData();
                    if(activeChatId === dataTargetId && currentTab === space) renderWorkspace(space);
                }
            } else if (data.type === 'delete_node') {
                const { space, id } = data.payload;
                contextData[`${space}Nodes`] = contextData[`${space}Nodes`].filter(n => n.id !== id);
                contextData[`${space}Nodes`].forEach(n => { if(n.parentId === id) n.parentId = null; });
                saveData();
                if(activeChatId === dataTargetId) {
                    if(space === 'canvas') refreshCanvasSummaryAI();
                    renderWorkspace(currentTab);
                }
            } else if (data.type === 'clear_canvas') {
                contextData.canvasNodes = []; saveData();
                if(activeChatId === dataTargetId && currentTab === 'canvas') { renderWorkspace('canvas'); refreshCanvasSummaryAI(); }
            } else if (data.type === 'update_summary') {
                if (data.payload.space === 'canvas') {
                    contextData.canvasSummary = data.payload.summary;
                    if(activeChatId === dataTargetId && currentTab === 'canvas') updateSummaryPanel(data.payload.summary, 'canvas');
                } else if (data.payload.space === 'tree') {
                    const tNode = contextData.treeNodes.find(n => n.id === data.payload.rootId);
                    if(tNode) tNode.treeSummary = data.payload.summary;
                    if(activeChatId === dataTargetId && currentTab === 'tree' && activeTreeRootId === data.payload.rootId) {
                        updateSummaryPanel(data.payload.summary, 'tree');
                    }
                }
                saveData();
            } else if (data.type === 'toggle_collapse') {
                const tNode = contextData.treeNodes.find(n => n.id === data.payload.id);
                if(tNode) { tNode.isCollapsed = data.payload.isCollapsed; saveData(); if(activeChatId === dataTargetId && currentTab === 'tree') renderWorkspace('tree'); }
            }
            
            // 個別の同期ロジック (Sync) は省略なし（元のまま維持）
            else if (data.type === 'sync_check' && dataTargetMode === 'contact') {
                const theirCanvasIds = (data.payload.canvas || []).map(k => k.id);
                const theirTreeIds = (data.payload.tree || []).map(k => k.id);
                const myCanvas = contextData.canvasNodes || [];
                const myTree = contextData.treeNodes || [];
                const pushCanvas = myCanvas.filter(n => !theirCanvasIds.includes(n.id));
                const pushTree = myTree.filter(n => !theirTreeIds.includes(n.id));
                const myCanvasIds = myCanvas.map(n => n.id);
                const myTreeIds = myTree.map(n => n.id);
                const pullCanvasIds = (data.payload.canvas || []).filter(k => !myCanvasIds.includes(k.id)).map(k => k.id);
                const pullTreeIds = (data.payload.tree || []).filter(k => !myTreeIds.includes(k.id)).map(k => k.id);
                conn.send({ type: 'sync_diff', payload: { pushCanvas, pushTree, pullCanvasIds, pullTreeIds }});
            }
            else if (data.type === 'sync_diff' && dataTargetMode === 'contact') {
                const { pushCanvas, pushTree, pullCanvasIds, pullTreeIds } = data.payload;
                let hasMerged = false;
                if (pushCanvas && pushCanvas.length > 0) { contextData.canvasNodes.push(...pushCanvas.map(n => ({...n, isMine: false}))); hasMerged = true; }
                if (pushTree && pushTree.length > 0) { contextData.treeNodes.push(...pushTree.map(n => ({...n, isMine: false}))); hasMerged = true; }
                const sendCanvas = (contextData.canvasNodes||[]).filter(n => pullCanvasIds.includes(n.id));
                const sendTree = (contextData.treeNodes||[]).filter(n => pullTreeIds.includes(n.id));
                if (sendCanvas.length > 0 || sendTree.length > 0) conn.send({ type: 'sync_push', payload: { pushCanvas: sendCanvas, pushTree: sendTree } });
                if (hasMerged) handleSyncMerged(targetId);
            }
            else if (data.type === 'sync_push' && dataTargetMode === 'contact') {
                const { pushCanvas, pushTree } = data.payload;
                let hasMerged = false;
                if (pushCanvas && pushCanvas.length > 0) { contextData.canvasNodes.push(...pushCanvas.map(n => ({...n, isMine: false}))); hasMerged = true; }
                if (pushTree && pushTree.length > 0) { contextData.treeNodes.push(...pushTree.map(n => ({...n, isMine: false}))); hasMerged = true; }
                if (hasMerged) handleSyncMerged(targetId);
            }
        });
        
        conn.on('close', () => { handleDisconnect(targetId); });
        conn.on('error', () => { handleDisconnect(targetId); });
    }

    function broadcastToRoom(data, excludePeerId = null) {
        if (activeChatMode !== 'room' || !isHost(activeChatId)) return;
        Object.keys(activeRoomPeers).forEach(peerId => {
            if (peerId !== excludePeerId) {
                const conn = activeRoomPeers[peerId];
                if (conn && conn.open) conn.send(data);
            }
        });
    }

    function broadcastRoomMembers() {
        broadcastToRoom({ type: 'room_members_update', roomId: activeChatId, members: roomMembersInfo });
    }

    function initiateSync(targetId) {
        if(activeChatMode !== 'contact') return;
        const contact = appData.contacts[targetId];
        if (!contact) return;
        const conn = activeConnections[targetId];
        if(conn && conn.open) {
            const myCanvasKeys = (contact.canvasNodes || []).map(n => ({ id: n.id }));
            const myTreeKeys = (contact.treeNodes || []).map(n => ({ id: n.id }));
            conn.send({ type: 'sync_check', payload: { canvas: myCanvasKeys, tree: myTreeKeys } });
        }
    }

    function handleSyncMerged(targetId) {
        saveData();
        if(activeChatMode === 'contact' && activeChatId === targetId) {
            renderWorkspace('canvas'); renderWorkspace('tree');
            refreshCanvasSummaryAI();
            if(activeTreeRootId) refreshTreeSummaryAI(activeTreeRootId);
        }
    }

    function handleDisconnect(targetId) {
        if(connectionStatus[targetId]) connectionStatus[targetId].isOnline = false;
        if(activeRoomPeers[targetId]) {
            delete activeRoomPeers[targetId];
            delete roomMembersInfo[targetId];
            broadcastRoomMembers();
        }
        updateOnlineIndicator();
    }

    function updateOnlineIndicator() {
        if (!activeChatId) return;
        let html = '';
        if (activeChatMode === 'room') {
            html = Object.keys(roomMembersInfo).map(pid => {
                const info = roomMembersInfo[pid];
                const isMe = pid === appData.myP2pId;
                const role = isMe ? '(あなた)' : (pid === activeChatId.split('-')[1] ? '(ホスト)' : '');
                return `<div style="display:flex; align-items:center; gap:5px; margin-bottom:4px;"><img src="${info.icon||''}" style="width:16px;height:16px;border-radius:50%;background:#ccc;object-fit:cover;"> ${info.name} <span style="font-size:0.7rem; color:#888;">${role}</span></div>`;
            }).join('');
        } else {
            const isOnline = connectionStatus[activeChatId] && connectionStatus[activeChatId].isOnline;
            const contactName = appData.contacts[activeChatId]?.name || activeChatId;
            html = `<div style="display:flex; align-items:center; gap:5px; margin-bottom:4px;"><span style="color:${isOnline?'#4CAF50':'#9e9e9e'}; font-size:14px;">●</span> ${contactName}</div>`;
        }
        
        const finalHtml = html || '<div style="opacity:0.6;">(誰もいません)</div>';
        document.getElementById('online-list-canvas').innerHTML = finalHtml; 
        document.getElementById('online-list-tree').innerHTML = finalHtml;
        updateTabUI();
    }

    // --- ワークスペース & UIイベント ---
    function initWorkspaces() {
        ['canvas', 'tree'].forEach(space => {
            const cont = document.getElementById(`${space}-workspace`);
            
            document.addEventListener('pointerdown', (e) => {
                if(!e.target.closest('.chat-node')) {
                    document.querySelectorAll('.chat-node').forEach(el => el.classList.remove('move-mode'));
                }
                if(space === 'tree' && !e.target.closest('.tree-node-content')) {
                    document.querySelectorAll('.tree-node').forEach(el => el.classList.remove('expanded'));
                }
            });

            cont.onpointerdown = (e) => {
                if (e.target.closest('.chat-node') || e.target.closest('.tree-node-content') || e.target.closest('.tree-btn')) return;
                viewStates[space].isDragging = true;
                viewStates[space].startX = e.clientX - viewStates[space].panX;
                viewStates[space].startY = e.clientY - viewStates[space].panY;
                cont.setPointerCapture(e.pointerId);
            };
            cont.onpointermove = (e) => {
                if (viewStates[space].isDragging) {
                    viewStates[space].panX = e.clientX - viewStates[space].startX;
                    viewStates[space].panY = e.clientY - viewStates[space].startY;
                    updateWorkspaceTransform(space);
                }
                handleNodePointerMove(e, space); 
            };
            const pointerUpHandler = (e) => {
                viewStates[space].isDragging = false;
                cont.releasePointerCapture(e.pointerId);
                handleNodePointerUp(e, space); 
            };
            cont.onpointerup = pointerUpHandler; cont.onpointercancel = pointerUpHandler;
        });
    }

    function resetWorkspaceView() {
        const cont = document.getElementById(`${currentTab}-workspace`);
        viewStates[currentTab].panX = -4000 + (cont.offsetWidth / 2);
        viewStates[currentTab].panY = -4000 + (cont.offsetHeight / 2);
        updateWorkspaceTransform(currentTab);
        updateMinimap(currentTab);
    }

    function updateWorkspaceTransform(space) {
        const layer = document.getElementById(`${space}-layer`);
        if(layer) layer.style.transform = `translate(${viewStates[space].panX}px, ${viewStates[space].panY}px)`;
        updateMinimap(space); // Viewport枠の更新
    }

    function getCenterCoordinates(space) {
        const cont = document.getElementById(`${space}-workspace`);
        const vs = viewStates[space];
        return { x: (cont.offsetWidth / 2) - vs.panX, y: (cont.offsetHeight / 2) - vs.panY };
    }

    function showNewMessageNav(x, y, space) {
        if(currentTab !== space) return;
        targetPanCoords = {x, y};
        const nav = document.getElementById('new-message-nav');
        nav.style.display = 'block';
        setTimeout(() => { nav.style.display = 'none'; }, 6000);
    }
    
    function jumpToNewMessage() {
        if(!targetPanCoords) return;
        const cont = document.getElementById(`${currentTab}-workspace`);
        const vs = viewStates[currentTab];
        vs.panX = (cont.offsetWidth / 2) - targetPanCoords.x;
        vs.panY = (cont.offsetHeight / 2) - targetPanCoords.y;
        updateWorkspaceTransform(currentTab);
        document.getElementById('new-message-nav').style.display = 'none';
        newMessages = []; // 既読
        updateMinimap(currentTab);
    }

    // ミニマップ用ロジック
    function updateMinimap(space) {
        if(currentTab !== space || !activeChatId) return;
        const cvs = document.getElementById(`minimap-${space === 'canvas' ? 'canvas' : 'tree'}`);
        if(!cvs) return;
        
        const cont = cvs.parentElement;
        cvs.width = cont.offsetWidth;
        cvs.height = cont.offsetHeight;
        const ctx = cvs.getContext('2d');

        const nodes = getActiveData()?.[`${space}Nodes`] || [];
        if(nodes.length === 0) return;

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodes.forEach(n => {
            const nx = n.x || 0; const ny = n.y || 0;
            if(nx < minX) minX = nx; if(ny < minY) minY = ny;
            if(nx > maxX) maxX = nx; if(ny > maxY) maxY = ny;
        });

        const pad = 400;
        minX -= pad; minY -= pad; maxX += pad; maxY += pad;
        const mapW = maxX - minX; const mapH = maxY - minY;
        const scale = Math.min(cvs.width / mapW, cvs.height / mapH);

        const offsetX = (cvs.width - mapW * scale) / 2;
        const offsetY = (cvs.height - mapH * scale) / 2;

        ctx.clearRect(0,0,cvs.width,cvs.height);

        // ノード点の描画
        nodes.forEach(n => {
            const x = offsetX + ((n.x||0) - minX) * scale;
            const y = offsetY + ((n.y||0) - minY) * scale;
            ctx.beginPath();
            ctx.arc(x, y, newMessages.includes(n.id) ? 4 : 2.5, 0, Math.PI*2);
            ctx.fillStyle = newMessages.includes(n.id) ? '#ff4081' : (n.isMine ? '#007aff' : '#888');
            ctx.fill();
        });

        // 自分の視点（ビューポート）の描画
        const wsCont = document.getElementById(`${space}-workspace`);
        const vs = viewStates[space];
        const viewX = offsetX + ((-vs.panX) - minX) * scale;
        const viewY = offsetY + ((-vs.panY) - minY) * scale;
        const viewW = wsCont.offsetWidth * scale;
        const viewH = wsCont.offsetHeight * scale;

        ctx.strokeStyle = '#4CAF50';
        ctx.lineWidth = 1.5;
        ctx.strokeRect(viewX, viewY, viewW, viewH);
    }

    function handleMinimapClick(e, space) {
        e.stopPropagation();
        const cvs = e.target;
        const rect = cvs.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;

        const nodes = getActiveData()?.[`${space}Nodes`] || [];
        if(nodes.length === 0) return;

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        nodes.forEach(n => {
            const nx = n.x || 0; const ny = n.y || 0;
            if(nx < minX) minX = nx; if(ny < minY) minY = ny;
            if(nx > maxX) maxX = nx; if(ny > maxY) maxY = ny;
        });
        const pad = 400;
        minX -= pad; minY -= pad; maxX += pad; maxY += pad;
        const mapW = maxX - minX; const mapH = maxY - minY;
        const scale = Math.min(cvs.width / mapW, cvs.height / mapH);
        const offsetX = (cvs.width - mapW * scale) / 2;
        const offsetY = (cvs.height - mapH * scale) / 2;

        // 逆算してキャンバス座標を取得
        const targetCanvasX = (clickX - offsetX) / scale + minX;
        const targetCanvasY = (clickY - offsetY) / scale + minY;

        const cont = document.getElementById(`${space}-workspace`);
        const vs = viewStates[space];
        vs.panX = (cont.offsetWidth / 2) - targetCanvasX;
        vs.panY = (cont.offsetHeight / 2) - targetCanvasY;
        
        updateWorkspaceTransform(space);
        newMessages = []; // 移動で既読化
    }

    // --- 操作ロジック ---
    function sendNetworkMessage(type, space, payload) {
        if (!activeChatId) return;
        const data = { type, roomId: activeChatMode === 'room' ? activeChatId : null, payload };
        if (activeChatMode === 'room') {
            if (isHost(activeChatId)) broadcastToRoom(data);
            else {
                const hostId = activeChatId.split('-')[1];
                if(activeConnections[hostId] && activeConnections[hostId].open) activeConnections[hostId].send(data);
            }
        } else {
            if(activeConnections[activeChatId] && activeConnections[activeChatId].open) activeConnections[activeChatId].send(data);
        }
    }

    let activeNodeDrag = null;
    function startNodeDrag(e, id, space) {
        e.stopPropagation();
        const d = getActiveData();
        if(!d) return;
        const nodeObj = d[`${space}Nodes`].find(n => n.id === id);
        if(!nodeObj || !nodeObj.isMine) return; 
        activeNodeDrag = { id, space, nodeObj, startX: e.clientX, startY: e.clientY, initX: nodeObj.x || 0, initY: nodeObj.y || 0 };
    }
    
    function handleNodePointerMove(e, space) {
        if (activeNodeDrag && activeNodeDrag.space === space) {
            const dx = e.clientX - activeNodeDrag.startX;
            const dy = e.clientY - activeNodeDrag.startY;
            activeNodeDrag.nodeObj.x = activeNodeDrag.initX + dx;
            activeNodeDrag.nodeObj.y = activeNodeDrag.initY + dy;
            
            const el = document.getElementById(`node-${space}-${activeNodeDrag.id}`);
            if(el) { el.style.left = `${activeNodeDrag.nodeObj.x}px`; el.style.top = `${activeNodeDrag.nodeObj.y}px`; }
            
            if(space === 'canvas') drawCanvasLines();
            if(space === 'tree') drawTreeLines();
        }
    }

    function handleNodePointerUp(e, space) {
        if (activeNodeDrag) {
            saveData();
            sendNetworkMessage('update_node', space, { space, node: activeNodeDrag.nodeObj });
            const el = document.getElementById(`node-${space}-${activeNodeDrag.id}`);
            if(el) el.classList.remove('move-mode');
            activeNodeDrag = null;
            updateMinimap(space);
        }
    }

    let replyTargetId = null;
    function setReplyTarget(id, name, space) {
        replyTargetId = id;
        if (space === 'canvas') {
            document.getElementById('canvas-reply-target-name').innerText = name;
            document.getElementById('canvas-reply-indicator').style.display = 'flex';
            document.getElementById('chat-input-text').focus();
        } else {
            document.getElementById('tree-reply-target-name').innerText = name;
            document.getElementById('tree-reply-indicator').style.display = 'flex';
            document.getElementById('tree-input-text').focus();
        }
    }
    function cancelReply(space) { 
        replyTargetId = null; 
        if(!space || space === 'canvas') document.getElementById('canvas-reply-indicator').style.display = 'none'; 
        if(!space || space === 'tree') document.getElementById('tree-reply-indicator').style.display = 'none'; 
    }

    function toggleMoveMode(e, id, space) {
        if(space !== 'canvas') return; 
        e.stopPropagation();
        document.querySelectorAll('.chat-node').forEach(el => el.classList.remove('move-mode'));
        const el = document.getElementById(`node-${space}-${id}`);
        if(el) el.classList.add('move-mode');
    }

    function toggleNodeExpand(e, id, space) {
        e.stopPropagation();
        const d = getActiveData();
        if(!d) return;
        const node = d[`${space}Nodes`].find(n => n.id === id);
        if(node) { node.isExpanded = !node.isExpanded; saveData(); renderWorkspace(space); }
    }

    function toggleTreeExpand(e, id) {
        e.stopPropagation();
        const el = document.getElementById(`node-tree-${id}`);
        if(el) {
            const isExpanded = el.classList.contains('expanded');
            document.querySelectorAll('.tree-node').forEach(n => n.classList.remove('expanded'));
            if(!isExpanded) el.classList.add('expanded');
        }
    }

    function clearCanvas() {
        if(!activeChatId) return;
        if(confirm("キャンバスの文字を全て消去しますか？\n（※ツリーには残ります）")) {
            const d = getActiveData();
            d.canvasNodes = []; saveData();
            renderWorkspace('canvas'); refreshCanvasSummaryAI();
            sendNetworkMessage('clear_canvas', 'canvas', {});
        }
    }
    
    // 画像保存処理
    async function exportCanvasImage() {
        if(!activeChatId) return;
        const layer = document.getElementById('canvas-layer');
        const d = getActiveData();
        if(!d || !d.canvasNodes || d.canvasNodes.length === 0) return alert('保存する発言がありません');

        const btn = document.getElementById('btn-export-canvas');
        const origText = btn.innerText;
        btn.innerText = "処理中...";

        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        d.canvasNodes.forEach(n => {
            if(n.x < minX) minX = n.x; if(n.y < minY) minY = n.y;
            if(n.x > maxX) maxX = n.x; if(n.y > maxY) maxY = n.y;
        });
        
        // パディングと表示エリア設定
        const pad = 100; minX -= pad; minY -= pad; maxX += pad + 300; maxY += pad + 200;
        const w = maxX - minX; const h = maxY - minY;

        const origTransform = layer.style.transform;
        layer.style.transform = `translate(${-minX}px, ${-minY}px)`;

        try {
            const canvas = await html2canvas(layer, { width: w, height: h, backgroundColor: document.body.style.backgroundColor || '#f0f4f8' });
            const link = document.createElement('a');
            link.download = `NC_Chat_Export_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        } catch(e) {
            console.error(e);
            alert("画像の保存に失敗しました");
        } finally {
            layer.style.transform = origTransform;
            btn.innerText = origText;
        }
    }

    // --- メイン送信処理 ---
    async function sendMessage(sourceSpace) {
        try {
            const inputEl = sourceSpace === 'canvas' ? document.getElementById('chat-input-text') : document.getElementById('tree-input-text');
            if (!inputEl) return;
            const text = inputEl.value.trim();
            const file = currentAttachedFile;

            if (!text && !file) return;
            if (!activeChatId) return alert('ルームや個別チャットを開いてください');
            
            const contextData = getActiveData();
            const id = Date.now().toString();
            const passedReplyId = replyTargetId;

            let cx = 0, cy = 0;
            if (sourceSpace === 'canvas') {
                if (passedReplyId) {
                    const parent = contextData.canvasNodes.find(n => n.id === passedReplyId);
                    cx = (parent ? parent.x : 0) + (Math.random() * 200 - 50); 
                    cy = (parent ? parent.y : 0) + 120 + (Math.random() * 50);
                } else {
                    const centerC = getCenterCoordinates('canvas');
                    cx = centerC.x + (Math.random() - 0.5) * 150; cy = centerC.y + (Math.random() - 0.5) * 150;
                }
            }

            const senderId = appData.myP2pId;
            const canvasNode = { id, text, file, aiData: null, isMine: true, senderId, x: cx, y: cy, parentId: passedReplyId, timestamp: Date.now(), isExpanded: false };
            const treeNode = { id, text, file, aiData: null, isMine: true, senderId, x: 0, y: 0, parentId: passedReplyId, timestamp: Date.now(), isCollapsed: false };

            contextData.canvasNodes.push(canvasNode);
            contextData.treeNodes.push(treeNode);
            
            inputEl.value = ''; 
            cancelReply(sourceSpace);
            if (file) removeAttachedFile();
            
            if (!passedReplyId && (!activeTreeRootId || !contextData.treeNodes.find(n=>n.id===activeTreeRootId))) {
                activeTreeRootId = treeNode.id;
            }
            
            saveData();
            
            renderWorkspace('canvas');
            renderWorkspace('tree');
            
            sendNetworkMessage('new_node', 'canvas', { space: 'canvas', node: canvasNode });
            sendNetworkMessage('new_node', 'tree', { space: 'tree', node: treeNode });

            processEmotionAndTreeAI(text, id, passedReplyId);
            
        } catch (error) { console.error("送信エラー:", error); alert("送信エラー\n" + error.message); }
    }

    // --- DOM描画とツリー改善 ---
    function getSenderName(senderId) {
        if (!senderId || senderId === appData.myP2pId) return appData.userName;
        if (activeChatMode === 'room' && roomMembersInfo[senderId]) return roomMembersInfo[senderId].name;
        if (activeChatMode === 'contact' && appData.contacts[activeChatId]) return appData.contacts[activeChatId].name;
        return "参加者";
    }

    function getSenderIcon(senderId) {
        if (!senderId || senderId === appData.myP2pId) return appData.userIcon;
        if (activeChatMode === 'room' && roomMembersInfo[senderId]) return roomMembersInfo[senderId].icon;
        if (activeChatMode === 'contact' && appData.contacts[activeChatId]) return appData.contacts[activeChatId].icon;
        return "";
    }

    function renderWorkspace(space) {
        const container = document.getElementById(space === 'tree' ? 'tree-nodes-container' : 'canvas-nodes-container');
        if(!container) return;
        container.innerHTML = '';
        
        const d = getActiveData();
        if(!d) {
            const svg = document.getElementById(`${space}-svg-layer`);
            if(svg) { while (svg.firstChild) { svg.removeChild(svg.firstChild); } }
            return;
        }
        
        if (space === 'tree') {
            const allNodes = d.treeNodes || [];
            if(allNodes.length > 0 && (!activeTreeRootId || !allNodes.find(n=>n.id===activeTreeRootId))) {
                const roots = allNodes.filter(n => !n.parentId).sort((a,b)=>a.timestamp - a.timestamp);
                activeTreeRootId = roots.length > 0 ? roots[0].id : allNodes[allNodes.length-1].id;
            }
            
            // ツリー配置計算（無駄な間隔を省く、Y軸を詰めるロジック）
            let currentY = 0;
            function calcLayout(nodeId, depth, xOffset) {
                const node = allNodes.find(n => n.id === nodeId);
                if(!node) return;
                node.x = xOffset; node.y = currentY;
                
                // 次の要素用のY幅を概算
                let yStep = 60;
                if(node.file && node.file.isImage) yStep += 100;
                if(node.text && node.text.length > 30) yStep += 20;
                currentY += yStep;
                
                const children = allNodes.filter(n => n.parentId === nodeId).sort((a,b)=>a.timestamp-b.timestamp);
                children.forEach(c => calcLayout(c.id, depth + 1, xOffset + 40));
            }
            
            if(activeTreeRootId) calcLayout(activeTreeRootId, 0, 50);

            allNodes.forEach(n => {
                if(n.y !== undefined) appendNodeToDOM(n, space, allNodes);
            });
            drawTreeLines();
            
            const rootNode = allNodes.find(n => n.id === activeTreeRootId);
            updateSummaryPanel(rootNode ? rootNode.treeSummary : "", 'tree');
            
        } else {
            const nodes = d.canvasNodes || [];
            nodes.forEach(n => appendNodeToDOM(n, space));
            drawCanvasLines();
            updateSummaryPanel(d.canvasSummary, 'canvas');
        }
        
        updateWorkspaceTransform(space);
    }

    function appendNodeToDOM(node, space, allNodes = []) {
        const targetLayer = document.getElementById(space === 'tree' ? 'tree-nodes-container' : 'canvas-nodes-container');
        if(!targetLayer) return;

        const el = document.createElement('div');
        const senderName = getSenderName(node.senderId);
        const ai = node.aiData || {};
        const font = ai.fontFamily || 'inherit';
        const color = ai.color || (node.isMine ? '#000' : 'var(--text-color)');
        const timeStr = formatTime(node.timestamp);
        
        const safeText = node.text ? node.text.replace(/\n/g, '<br>') : '';
        const displayText = ai.formattedText ? ai.formattedText.replace(/\n/g, '<br>') : safeText;
        
        if (space === 'tree') {
            el.className = `tree-node ${node.isMine ? 'mine' : 'theirs'}`;
            el.id = `node-tree-${node.id}`;
            el.style.left = `${node.x || 0}px`; el.style.top = `${node.y || 0}px`;
            
            const isLong = displayText.length >= 30;
            const collapsedText = isLong ? displayText.substring(0, 30) + '...' : displayText;
            const replyBtn = `<div class="tree-btn" onclick="setReplyTarget('${node.id}', '${senderName}', 'tree'); event.stopPropagation();">↩️</div>`;
            
            let replyHtml = '';
            if (node.parentId) {
                const parentNode = allNodes.find(n => n.id === node.parentId);
                if (parentNode) {
                    const pName = getSenderName(parentNode.senderId);
                    replyHtml = `<div class="tree-node-reply-label">↳ ${pName} へ返信</div>`;
                }
            }

            let contentHtml = `
                ${replyHtml}
                <div class="tree-node-name">${senderName} <span class="node-time" style="margin-left: 6px;">${timeStr}</span></div>
                <div class="tree-node-content ${isLong ? 'expandable' : ''}" onclick="toggleTreeExpand(event, '${node.id}')">
                    <div class="tree-node-text text-collapsed" style="font-family:'${font}', sans-serif; color:${color};">${collapsedText}</div>
                    ${isLong ? `<div class="tree-node-text text-full" style="font-family:'${font}', sans-serif; color:${color};">${displayText}</div>` : ''}
            `;
            if (node.file) {
                if (node.file.isImage) contentHtml += `<img src="${node.file.dataBase64}" style="max-height:80px; border-radius:6px; margin-top:4px;" onclick="window.open('${node.file.dataBase64}', '_blank')">`;
                else contentHtml += `<br><a href="${node.file.dataBase64}" download="${node.file.name}" style="font-size:0.8rem;">📎 ${node.file.name}</a>`;
            }
            contentHtml += `</div><div class="tree-controls">${replyBtn}</div>`;
            el.innerHTML = contentHtml;
            
        } else {
            el.className = `chat-node ${node.isMine ? 'mine' : 'theirs'}`;
            if (!node.parentId) el.classList.add('root-node'); 
            el.id = `node-canvas-${node.id}`;
            el.style.left = `${node.x || 0}px`; el.style.top = `${node.y || 0}px`;
            
            const senderIcon = getSenderIcon(node.senderId);
            const isExpanded = node.isExpanded ? true : false;
            
            let handleHtml = node.isMine ? `<div class="action-handle move-handle" onpointerdown="startNodeDrag(event, '${node.id}', '${space}')">＋</div>` : ``;
            let expandBtn = `<div class="action-handle expand-handle" onclick="toggleNodeExpand(event, '${node.id}', '${space}')">${isExpanded ? '▲' : '▼'}</div>`;

            let contentHtml = `<div class="node-header" onclick="toggleMoveMode(event, '${node.id}', '${space}')"><img src="${senderIcon}" class="node-icon">${senderName} <span class="node-time">${timeStr}</span></div>`;
            
            contentHtml += `<div class="node-body" onclick="setReplyTarget('${node.id}', '${senderName}', 'canvas')">`;
            if(displayText) contentHtml += `<div class="node-text ${isExpanded ? 'text-full' : 'text-collapsed'}" style="font-family:'${font}', sans-serif; color:${color};">${displayText}</div>`;
            if (node.file) {
                if (node.file.isImage) contentHtml += `<img src="${node.file.dataBase64}" style="max-width:100%; border-radius:8px; margin-top:8px;">`;
                else contentHtml += `<a href="${node.file.dataBase64}" download="${node.file.name}" style="display:inline-block; margin-top:8px; padding:6px; background:rgba(0,0,0,0.05); font-size:0.8rem;">📎 ${node.file.name}</a>`;
            }
            contentHtml += `</div>`;
            
            el.innerHTML = expandBtn + handleHtml + contentHtml;
        }
        targetLayer.appendChild(el);
    }

    // キャンバス用結線
    function drawCanvasLines() {
        if(currentTab !== 'canvas' || !activeChatId) return;
        const svg = document.getElementById('canvas-svg-layer');
        if(!svg) return;
        while (svg.firstChild) { svg.removeChild(svg.firstChild); }

        const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
        defs.innerHTML = `<marker id="dot-canvas" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"><circle cx="5" cy="5" r="4" fill="rgba(0, 122, 255, 0.8)" /></marker>`;
        svg.appendChild(defs);
        
        const nodes = getActiveData()?.canvasNodes || [];
        nodes.forEach(n => {
            if(n.parentId) {
                const parent = nodes.find(p => p.id === n.parentId);
                if(parent) {
                    const pEl = document.getElementById(`node-canvas-${parent.id}`);
                    const cEl = document.getElementById(`node-canvas-${n.id}`);
                    const pW = pEl ? pEl.offsetWidth : 160; const pH = pEl ? pEl.offsetHeight : 80;
                    const cW = cEl ? cEl.offsetWidth : 160; const cH = cEl ? cEl.offsetHeight : 80;

                    const px = (parent.x || 0) + pW/2; const py = (parent.y || 0) + pH/2;
                    const cx = (n.x || 0) + cW/2; const cy = (n.y || 0) + cH/2;
                    
                    if (Math.hypot(cx - px, cy - py) < 40) return; 

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${px},${py} C ${(px+cx)/2},${py} ${(px+cx)/2},${cy} ${cx},${cy}`); 
                    path.setAttribute('stroke', 'rgba(0, 122, 255, 0.5)');
                    path.setAttribute('stroke-width', '3');
                    path.setAttribute('stroke-dasharray', '6,6'); 
                    path.setAttribute('fill', 'none');
                    path.setAttribute('marker-end', 'url(#dot-canvas)'); 
                    svg.appendChild(path);
                }
            }
        });
    }

    // ツリー用結線 (L字型)
    function drawTreeLines() {
        if(currentTab !== 'tree' || !activeChatId) return;
        const svg = document.getElementById('tree-svg-layer');
        if(!svg) return;
        while (svg.firstChild) { svg.removeChild(svg.firstChild); }

        const nodes = getActiveData()?.treeNodes || [];
        nodes.forEach(n => {
            if(n.parentId && n.x !== undefined) {
                const parent = nodes.find(p => p.id === n.parentId);
                if(parent && parent.x !== undefined) {
                    const pEl = document.getElementById(`node-tree-${parent.id}`);
                    const cEl = document.getElementById(`node-tree-${n.id}`);
                    const pH = pEl ? pEl.offsetHeight : 40;
                    const cH = cEl ? cEl.offsetHeight : 40;

                    // 親の左下付近から子の左側中央へL字で結ぶ
                    const startX = parent.x + 10;
                    const startY = parent.y + pH - 5;
                    const endX = n.x - 5;
                    const endY = n.y + (cH / 2);

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    // L字型パス (V と H を使用)
                    path.setAttribute('d', `M ${startX},${startY} V ${endY} H ${endX}`); 
                    path.setAttribute('stroke', 'rgba(156, 39, 176, 0.4)');
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('fill', 'none');
                    svg.appendChild(path);
                }
            }
        });
    }

    // --- AI まとめ生成 ---
    async function requestSummaryAI(texts) {
        if (!appData.openAiKey || !texts) return null;
        const prompt = `以下の会話内容から話題を要約して下さい。
ルール:
1. 箇条書きの記号は一切使わず、自然な文章として要約すること。
2. 最大3行程度の短く完結な文章にすること。
出力JSONフォーマット: {"summary": "要約テキスト（改行は \\n で表現）"}
会話内容:
${texts.substring(0, 1500)}`;

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${appData.openAiKey}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{role: "system", content: "You output strictly valid JSON."}, {role: "user", content: prompt}], response_format: { type: "json_object" } }) 
            });
            const data = await response.json();
            const updateData = JSON.parse(data.choices[0].message.content);
            return updateData.summary;
        } catch(e) { return null; }
    }

    async function refreshCanvasSummaryAI() {
        if(!activeChatId) return;
        const d = getActiveData();
        const texts = (d.canvasNodes || []).map(n => n.text).filter(t => t).join("\n");
        if(!texts) {
            d.canvasSummary = ""; saveData(); updateSummaryPanel("", 'canvas'); return;
        }
        document.querySelector('#canvas-summary-panel .ai-summary-text').innerHTML = "🔄 処理中...";
        const summary = await requestSummaryAI(texts);
        if(summary) {
            d.canvasSummary = summary; saveData();
            if(currentTab === 'canvas') updateSummaryPanel(summary, 'canvas');
            sendNetworkMessage('update_summary', 'canvas', { space: 'canvas', summary });
        }
    }

    async function refreshTreeSummaryAI(rootId) {
        if(!activeChatId || !rootId) return;
        const d = getActiveData();
        const texts = (d.treeNodes || []).map(n => n.text).filter(t => t).join("\n");
        if(!texts) { updateSummaryPanel("", 'tree'); return; }
        
        document.querySelector('#tree-summary-panel .ai-summary-text').innerHTML = "🔄 処理中...";
        const summary = await requestSummaryAI(texts);
        if(summary) {
            const rNode = d.treeNodes.find(n => n.id === rootId);
            if(rNode) rNode.treeSummary = summary; saveData();
            if(currentTab === 'tree' && activeTreeRootId === rootId) updateSummaryPanel(summary, 'tree');
            sendNetworkMessage('update_summary', 'tree', { space: 'tree', rootId, summary });
        }
    }

    async function processEmotionAndTreeAI(text, nodeId, canvasParentId) {
        if (!appData.openAiKey || !text) return; 
        const d = getActiveData();
        
        try {
            const prompt = `発言: "${text}"
以下のJSONフォーマットで返して下さい:
{
  "formattedText": "元の発言テキストを適度な位置(15〜20文字程度)で改行(\\n)を挿入したもの。",
  "fontFamily": "[Zen Maru Gothic|Kaisei Decol|RocknRoll One|DotGothic16]",
  "color": "#000000"
}`;

            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${appData.openAiKey}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{role: "system", content: "You output strictly valid JSON."}, {role: "user", content: prompt}], response_format: { type: "json_object" } }) 
            });
            const data = await response.json();
            const updateData = JSON.parse(data.choices[0].message.content);
            
            const cNode = d.canvasNodes.find(n => n.id === nodeId);
            if(cNode) cNode.aiData = updateData;

            const tNode = d.treeNodes.find(n => n.id === nodeId);
            if(tNode) tNode.aiData = updateData;
            
            saveData();

            sendNetworkMessage('update_node', 'canvas', { space: 'canvas', node: cNode });
            sendNetworkMessage('update_node', 'tree', { space: 'tree', node: tNode });

            renderWorkspace(currentTab);
            
            refreshCanvasSummaryAI();
            refreshTreeSummaryAI(activeTreeRootId);

        } catch(e) { console.error("AI解析エラー:", e); }
    }
</script>
