<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>プライベートチャット</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Kiwi+Maru:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700;800&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* --- テーマ設定 ＆ チャット吹き出しスタイル --- */
        :root { --chat-fs: 16px; --bg-img: none; }
        
        [data-theme="default"], body { 
            --bg-color: #f0f4f8; --header-bg: rgba(255, 255, 255, 0.85); --tab-bg: rgba(255,255,255,0.5); --accent-color: #007aff; --tab-active-bg: #007aff; --tab-active-color: #fff; --card-bg: rgba(255, 255, 255, 0.5); --text-color: #333; --app-font: 'Zen Maru Gothic', sans-serif; 
            --chat-br: 18px; --chat-tail-user: 4px; --chat-tail-other: 4px; --chat-bg-user: #007aff; --chat-color-user: #fff; --chat-bg-other: #fff; --chat-color-other: #333; --chat-border: none;
        }
        [data-theme="cute"] { 
            --bg-color: #fff0f5; --header-bg: rgba(255, 182, 193, 0.85); --tab-bg: rgba(255,255,255,0.4); --accent-color: #ff69b4; --tab-active-bg: #ff69b4; --tab-active-color: #fff; --card-bg: rgba(255, 255, 255, 0.5); --text-color: #5d4037; --app-font: 'M PLUS Rounded 1c', sans-serif;  
            --chat-br: 30px; --chat-tail-user: 30px; --chat-tail-other: 30px; --chat-bg-user: #ffb6c1; --chat-color-user: #5d4037; --chat-bg-other: rgba(255,255,255,0.95); --chat-color-other: #5d4037; --chat-border: 2px solid #ff69b4;
        }
        [data-theme="gothic"] { 
            --bg-color: #1a0b1c; --header-bg: rgba(26, 11, 28, 0.95); --tab-bg: rgba(40, 20, 45, 0.6); --accent-color: #b50043; --tab-active-bg: #b50043; --tab-active-color: #fff; --card-bg: rgba(40, 20, 45, 0.7); --text-color: #eaddf0; --app-font: 'Kaisei Decol', serif; 
            --chat-br: 0px; --chat-tail-user: 0px; --chat-tail-other: 0px; --chat-bg-user: #4a001c; --chat-color-user: #eaddf0; --chat-bg-other: #28142d; --chat-color-other: #eaddf0; --chat-border: 1px solid #b50043;
        }
        [data-theme="cafe"] { 
            --bg-color: #f4e9d8; --header-bg: rgba(139, 90, 43, 0.9); --tab-bg: rgba(255,255,255,0.4); --accent-color: #8b5a2b; --tab-active-bg: #8b5a2b; --tab-active-color: #fff; --card-bg: rgba(255, 250, 240, 0.65); --text-color: #4a3018; --app-font: 'Kiwi Maru', serif; 
            --chat-br: 16px; --chat-tail-user: 0px; --chat-tail-other: 0px; --chat-bg-user: #8b5a2b; --chat-color-user: #fff; --chat-bg-other: #fff; --chat-color-other: #4a3018; --chat-border: none;
        }
        [data-theme="transparent"] { 
            --bg-color: #e8f4f8; --header-bg: rgba(255, 255, 255, 0.3); --tab-bg: rgba(255,255,255,0.2); --accent-color: #40c0cb; --tab-active-bg: #40c0cb; --tab-active-color: #fff; --card-bg: rgba(255, 255, 255, 0.25); --text-color: #2c5263; --app-font: 'Noto Sans JP', sans-serif; 
            --chat-br: 20px; --chat-tail-user: 20px; --chat-tail-other: 20px; --chat-bg-user: rgba(64,192,203,0.7); --chat-color-user: #fff; --chat-bg-other: rgba(255,255,255,0.8); --chat-color-other: #1a3642; --chat-border: 1px solid rgba(255,255,255,0.6);
        }
        [data-theme="japanese"] { 
            --bg-color: #e6e2d3; --header-bg: rgba(43, 43, 43, 0.95); --tab-bg: rgba(255,255,255,0.3); --accent-color: #b7282e; --tab-active-bg: #b7282e; --tab-active-color: #fff; --card-bg: rgba(255, 255, 255, 0.55); --text-color: #2b2b2b; --app-font: 'Shippori Mincho', serif; 
            --chat-br: 2px; --chat-tail-user: 2px; --chat-tail-other: 2px; --chat-bg-user: #b7282e; --chat-color-user: #fff; --chat-bg-other: #e6e2d3; --chat-color-other: #2b2b2b; --chat-border: 1px solid #8f1d22;
        }

        /* --- 全体レイアウト --- */
        body { 
            font-family: var(--app-font); margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); 
            height: 100dvh; /* iOS Safari用 Dynamic Viewport Height */
            display: flex; flex-direction: column; overflow: hidden; transition: font-family 0.3s ease; 
        }
        
        .glass-card { background: var(--card-bg); backdrop-filter: blur(28px) saturate(160%); -webkit-backdrop-filter: blur(28px) saturate(160%); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; }
        button { font-family: inherit; cursor: pointer; border: none; border-radius: 14px; transition: transform 0.2s, box-shadow 0.2s; touch-action: manipulation; }
        button:active { transform: scale(0.92); }
        input, select, textarea { font-family: inherit; box-sizing: border-box; }

        /* ヘッダー・メインタブ (固定領域) */
        .fixed-top-area {
            flex-shrink: 0;
            background: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            /* iPhoneのノッチ(セーフエリア)回避 */
            padding-top: max(10px, env(safe-area-inset-top)); 
            border-bottom: 1px solid rgba(128,128,128,0.2);
            z-index: 100;
        }

        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .app-header h1 { margin: 0; font-size: 1.2rem; font-weight: 900; color: var(--accent-color); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .tabs { display: flex; background-color: var(--tab-bg); margin: 5px 15px 10px 15px; border-radius: 20px; padding: 6px; border: 1px solid rgba(255,255,255,0.2); position: relative;}
        .tab { flex: 1; text-align: center; padding: 10px 0; color: var(--text-color); opacity: 0.6; font-weight: 900; font-size: 0.9rem; border-radius: 16px; cursor: pointer; position: relative; z-index: 2; transition: all 0.3s; white-space: nowrap;}
        .tab.active { opacity: 1; color: var(--tab-active-color); }
        .tab.connected { color: #4CAF50; opacity: 1; }
        .tab-highlight { position: absolute; top: 6px; bottom: 6px; left: 6px; width: 0; background: var(--tab-active-bg); border-radius: 16px; z-index: 1; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), width 0.4s; }

        /* コンテンツエリア */
        .tab-content { display: none; flex-grow: 1; padding: 0 10px 10px 10px; flex-direction: column; overflow: hidden; animation: fadeIn 0.3s forwards; }
        .tab-content.active { display: flex; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }

        /* --- チャット画面 UI --- */
        .chat-wrapper { flex-grow: 1; display: flex; flex-direction: column; position: relative; border-radius: 16px; overflow: hidden; background: rgba(0,0,0,0.03); border: 1px solid rgba(128,128,128,0.2); }
        
        .chat-header-tools { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; gap: 8px; }
        .tool-btn { background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); color: #f44336; border: 1px solid rgba(244,67,54,0.3); border-radius: 10px; padding: 6px 10px; font-size: 0.8rem; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .chat-bg-layer { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: var(--bg-img); background-size: cover; background-position: center; opacity: 0.15; z-index: 0; pointer-events: none; }
        
        .chat-container { flex-grow: 1; overflow-y: auto; padding: 50px 15px 15px 15px; display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 1; scroll-behavior: smooth; }
        .chat-msg { padding: 12px 16px; border-radius: var(--chat-br); max-width: 80%; font-size: var(--chat-fs); box-shadow: 0 4px 10px rgba(0,0,0,0.05); word-break: break-all; display: flex; flex-direction: column; border: var(--chat-border); position: relative; z-index: 1; line-height: 1.5; }
        .chat-msg.user { align-self: flex-end; background: var(--chat-bg-user); color: var(--chat-color-user); border-bottom-right-radius: var(--chat-tail-user); }
        .chat-msg.other { align-self: flex-start; background: var(--chat-bg-other); color: var(--chat-color-other); border-bottom-left-radius: var(--chat-tail-other); }
        .chat-name { font-size: 0.75rem; opacity: 0.8; margin-bottom: 4px; font-weight: bold; }
        .chat-image { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
        .chat-file-link { display: inline-flex; align-items: center; gap: 8px; padding: 10px 12px; background: rgba(0,0,0,0.1); border-radius: 8px; text-decoration: none; color: inherit; font-weight: bold; margin-top: 5px; font-size: 0.9rem; }

        /* 入力バー */
        .chat-controls-bar { display: flex; gap: 8px; align-items: flex-end; padding: 10px; background: var(--card-bg); border-top: 1px solid rgba(128,128,128,0.2); position: relative; z-index: 2; backdrop-filter: blur(20px); }
        .chat-input { flex-grow: 1; padding: 12px; border-radius: 14px; border: 1px solid rgba(128,128,128,0.3); font-size: 1rem; resize: none; min-height: 44px; max-height: 120px; background: rgba(255,255,255,0.9); line-height: 1.4; color: #333; }
        .chat-action-btn { background: var(--accent-color); color: white; border-radius: 14px; width: 44px; height: 44px; font-weight: 900; font-size: 1.3rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .file-attach-btn { background: rgba(128,128,128,0.2); color: var(--text-color); font-size: 1.2rem; }

        /* プログレスバー */
        #progress-bar-container { display: none; position: absolute; top: 0; left: 0; right: 0; background: rgba(255,255,255,0.9); z-index: 50; padding: 10px; text-align: center; border-bottom: 1px solid rgba(128,128,128,0.2); backdrop-filter: blur(10px); }
        .progress-track { width: 100%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 4px; overflow: hidden; margin-top: 5px; }
        .progress-fill { height: 100%; background: var(--accent-color); width: 0%; transition: width 0.2s; }

        /* プレビューエリア */
        .chat-preview-area { display: none; padding: 10px; background: var(--card-bg); position: relative; z-index: 2; border-top: 1px solid rgba(128,128,128,0.2); }
        .preview-item { display: inline-block; position: relative; background: #fff; padding: 5px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .preview-item img { max-height: 60px; border-radius: 4px; display: block; }
        .preview-item .file-name { font-size: 0.8rem; padding: 5px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #333; font-weight: bold; }
        .preview-remove { position: absolute; top: -8px; right: -8px; background: #f44336; color: #fff; width: 22px; height: 22px; border-radius: 50%; font-size: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; }

        /* モーダル群 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
        .modal-content { background: var(--card-bg); backdrop-filter: blur(28px) saturate(160%); width: 100%; max-width: 400px; border-radius: 24px; padding: 25px; box-sizing: border-box; border: 1px solid rgba(255,255,255,0.3); color: var(--text-color); }
        
        /* 画像ビューアー特化 */
        #img-viewer-modal { padding: 0; background: rgba(0,0,0,0.9); flex-direction: column; }
        #img-viewer-img { max-width: 100%; max-height: 80vh; object-fit: contain; margin-bottom: 20px; }
        .viewer-btns { display: flex; gap: 15px; }
        .viewer-btn { padding: 12px 24px; border-radius: 12px; font-weight: bold; font-size: 1.1rem; text-decoration: none; display: flex; align-items: center; justify-content: center; background: #fff; color: #333; }

        /* 連絡先リスト */
        .contact-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,0.5); border-radius: 12px; margin-bottom: 10px; cursor: pointer; transition: background 0.2s; border: 1px solid rgba(128,128,128,0.2); }
        .contact-item:active { background: rgba(255,255,255,0.8); }

        /* 設定画面 UI */
        .settings-container { overflow-y: auto; flex-grow: 1; padding-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.9rem; color: var(--text-color); opacity: 0.8; margin-bottom: 6px; font-weight: 700; }
        .form-group input, .form-group select { width: 100%; padding: 14px; border: 1px solid rgba(128,128,128,0.2); border-radius: 14px; font-size: 1rem; background: rgba(255,255,255,0.9); font-weight: 700; color: #333; }
    </style>
</head>
<body data-theme="default">

<div class="fixed-top-area">
    <div class="app-header">
        <h1 id="app-title-display">プライベートチャット</h1>
        <div style="display: flex; gap: 8px;">
            <button onclick="changeChatFontSize(-2)" style="padding:6px 12px; background:rgba(128,128,128,0.2); color:var(--text-color); border-radius:10px; font-weight:bold;">A-</button>
            <button onclick="changeChatFontSize(2)" style="padding:6px 12px; background:rgba(128,128,128,0.2); color:var(--text-color); border-radius:10px; font-weight:bold;">A+</button>
        </div>
    </div>

    <div class="tabs" id="main-tabs">
        <div class="tab-highlight" id="tab-highlight"></div>
        <div class="tab active" id="tab-btn-p2p" onclick="handleP2PTabClick(this)">📱 ワイヤレス</div>
        <div class="tab" id="tab-btn-ai" onclick="switchTab('tab-ai', this)">🤖 AIルーム</div>
        <div class="tab" id="tab-btn-settings" onclick="switchTab('tab-settings', this)">⚙️ 設定</div>
    </div>
</div>

<div id="tab-p2p" class="tab-content active">
    <div class="chat-wrapper">
        <div class="chat-bg-layer"></div>
        
        <div id="progress-bar-container">
            <div id="progress-text" style="font-size:0.85rem; font-weight:bold; color:var(--text-color);">送信中... 0%</div>
            <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
        </div>

        <div class="chat-header-tools">
            <button class="tool-btn" onclick="clearChatLog('p2p')">🗑️ ログ消去</button>
        </div>

        <div class="chat-container" id="p2p-chat-box"></div>
        
        <div class="chat-preview-area" id="p2p-preview-area">
            <div class="preview-item">
                <div id="p2p-preview-content"></div>
                <button class="preview-remove" onclick="removeP2PFile()">✖</button>
            </div>
        </div>

        <div class="chat-controls-bar">
            <input type="file" id="p2p-file-input" style="display:none;" onchange="handleP2PFileSelect(this)">
            <button class="chat-action-btn file-attach-btn" onclick="document.getElementById('p2p-file-input').click()">📎</button>
            <textarea id="p2p-input-text" class="chat-input" placeholder="メッセージ (Shift+Enterで改行)" rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event, sendP2PMessage)"></textarea>
            <button class="chat-action-btn" onclick="sendP2PMessage()">➤</button>
        </div>
    </div>
</div>

<div id="tab-ai" class="tab-content">
    <div class="chat-wrapper">
        <div class="chat-bg-layer"></div>

        <div class="chat-header-tools">
            <button class="tool-btn" onclick="clearChatLog('ai')">🗑️ ログ消去</button>
        </div>

        <div class="chat-container" id="ai-chat-box"></div>
        
        <div class="chat-preview-area" id="ai-preview-area">
            <div class="preview-item">
                <img id="ai-img-preview">
                <button class="preview-remove" onclick="removeAIImage()">✖</button>
            </div>
        </div>

        <div class="chat-controls-bar">
            <input type="file" id="ai-file-input" accept="image/*" style="display:none;" onchange="handleAIImageSelect(this)">
            <button class="chat-action-btn file-attach-btn" onclick="document.getElementById('ai-file-input').click()">📷</button>
            <textarea id="ai-input-text" class="chat-input" placeholder="AIに質問... (Shift+Enterで改行)" rows="1" oninput="autoResize(this)" onkeydown="handleEnter(event, askAI)"></textarea>
            <button class="chat-action-btn" style="background: linear-gradient(45deg, #9C27B0, #E91E63);" onclick="askAI()">✨</button>
        </div>
    </div>
</div>

<div id="tab-settings" class="tab-content">
    <div class="settings-container">
        <div class="glass-card" style="padding: 20px; margin-bottom: 20px;">
            <h3 style="color:var(--accent-color); margin-top:0; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px;">プロフィール設定</h3>
            <div class="form-group">
                <label>アプリのタイトル</label>
                <input type="text" id="setting-title" placeholder="例：プライベートチャット" onchange="appData.chatTitle=this.value; saveData(); applySettingsUI();">
            </div>
            <div class="form-group">
                <label>あなたの名前（チャットで表示されます）</label>
                <input type="text" id="setting-username" placeholder="名前を入力" onchange="appData.userName=this.value; saveData();">
            </div>
        </div>

        <div class="glass-card" style="padding: 20px; margin-bottom: 20px;">
            <h3 style="color:var(--accent-color); margin-top:0; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px;">デザイン・テーマ</h3>
            <div class="form-group">
                <label>テーマ（吹き出しの形やフォントが変わります）</label>
                <select id="theme-selector" onchange="changeTheme(this.value)">
                    <option value="default">デフォルト（クリアブルー・角丸）</option>
                    <option value="cute">かわいい（ピンク・まんまる雲）</option>
                    <option value="gothic">ゴスロリ（黒・深紅・四角エッジ）</option>
                    <option value="cafe">カフェ（ブラウン・片側角丸）</option>
                    <option value="transparent">透明感（ガラス風・透け感）</option>
                    <option value="japanese">和風（抹茶・深紅・短冊風）</option>
                </select>
            </div>
            <div class="form-group">
                <label>チャット背景画像（薄く透けます）</label>
                <input type="file" accept="image/*" onclick="this.value=null;" onchange="loadBackgroundImage(this)" style="padding:10px; background:transparent;">
                <button onclick="clearBackgroundImage()" style="margin-top:10px; width:100%; padding:12px; background:rgba(244,67,54,0.1); color:#f44336; border:1px solid #f44336; border-radius:10px; font-weight:bold;">背景画像をリセット</button>
            </div>
        </div>

        <div class="glass-card" style="padding: 20px; margin-bottom: 20px;">
            <h3 style="color:var(--accent-color); margin-top:0; border-bottom:1px solid rgba(128,128,128,0.2); padding-bottom:8px;">AI ルーム設定</h3>
            <div class="form-group">
                <label>OpenAI APIキー (GPT-5.2用)</label>
                <input type="password" id="setting-openai-key" placeholder="sk-..." onchange="appData.openAiKey=this.value; saveData();">
            </div>
        </div>

        <div class="glass-card" style="padding: 20px; border: 2px solid #f44336;">
            <h3 style="color:#f44336; margin-top:0;">⚠️ 危険領域</h3>
            <button onclick="hardResetApp()" style="background:#f44336; color:#fff; width:100%; padding:16px; border-radius:12px; font-weight:900; font-size:1.1rem;">アプリを完全にリセットする</button>
            <p style="font-size:0.8rem; color:#f44336; margin-bottom:0; text-align:center; margin-top:10px;">すべての履歴と設定を消去します。</p>
        </div>
    </div>
</div>

<div class="modal-overlay" id="p2p-connect-modal">
    <div class="modal-content">
        <h2 style="margin-top:0; color:var(--accent-color); border-bottom:2px solid rgba(128,128,128,0.2); padding-bottom:10px;">📡 端末接続</h2>
        <div style="font-size:1rem; margin-bottom:15px; background:rgba(255,255,255,0.5); padding:10px; border-radius:12px; text-align:center;">
            あなたのID: <strong style="font-size:1.4rem; color:var(--accent-color);" id="modal-my-id">----</strong>
        </div>
        
        <label style="font-weight:bold; font-size:0.9rem;">相手の4桁IDを入力して接続</label>
        <div style="display:flex; gap:8px; margin-bottom:20px; margin-top:5px;">
            <input type="number" id="modal-target-id" placeholder="1234" style="flex:1; padding:12px; border-radius:12px; border:1px solid #ccc; font-size:1.2rem; text-align:center;" inputmode="numeric">
            <button onclick="connectP2P()" style="background:var(--accent-color); color:white; padding:0 20px; border-radius:12px; font-weight:bold;">繋ぐ</button>
        </div>

        <h3 style="font-size:1rem; margin-bottom:10px;">🕒 連絡先（履歴）</h3>
        <div id="contact-list-area" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px;">
            </div>

        <button onclick="closeModal('p2p-connect-modal')" style="width:100%; padding:12px; border-radius:12px; background:rgba(0,0,0,0.1); color:#333; font-weight:bold;">閉じる</button>
    </div>
</div>

<div class="modal-overlay" id="p2p-disconnect-modal">
    <div class="modal-content" style="text-align:center;">
        <h2 style="margin-top:0; color:#f44336;">通信を切断しますか？</h2>
        <p style="margin-bottom:20px;">現在 <strong id="disconnect-target-name"></strong> と接続中です。</p>
        <div style="display:flex; gap:10px;">
            <button onclick="closeModal('p2p-disconnect-modal')" style="flex:1; padding:12px; border-radius:12px; background:rgba(0,0,0,0.1); font-weight:bold;">やめる</button>
            <button onclick="disconnectP2P()" style="flex:1; padding:12px; border-radius:12px; background:#f44336; color:white; font-weight:bold;">切断する</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="img-viewer-modal">
    <button onclick="closeModal('img-viewer-modal')" style="position:absolute; top:20px; right:20px; background:rgba(255,255,255,0.2); color:white; width:40px; height:40px; border-radius:50%; font-size:1.5rem; display:flex; align-items:center; justify-content:center;">✖</button>
    <img id="img-viewer-img" src="">
    <div class="viewer-btns">
        <a id="img-viewer-dl" href="" download="image.jpg" class="viewer-btn">📥 端末に保存する</a>
    </div>
</div>

<script>
    // ==========================================
    // 🚀 基本データと初期化
    // ==========================================
    let appData = { 
        theme: 'default', 
        backgroundImage: null, 
        chatTitle: 'プライベートチャット', 
        userName: 'ゲスト',
        openAiKey: '',
        chatFontSize: 16,
        myP2pId: '', 
        contacts: {}, // { "1234": { name: "Ripi", history: [] } }
        aiHistory: []
    };

    let currentPartnerId = null;

    function loadData() {
        const backup = localStorage.getItem('private_chat_data_v2');
        if (backup) { try { appData = { ...appData, ...JSON.parse(backup) }; } catch(e) {} }
        
        if (!appData.contacts) appData.contacts = {};
        if (!appData.myP2pId) {
            appData.myP2pId = Math.floor(1000 + Math.random() * 9000).toString();
            saveData();
        }

        applyTheme(); applyBackgroundImage(); applySettingsUI();
        
        document.getElementById('setting-title').value = appData.chatTitle;
        document.getElementById('setting-username').value = appData.userName;
        document.getElementById('setting-openai-key').value = appData.openAiKey || '';
        document.getElementById('theme-selector').value = appData.theme;
        
        renderChat('ai');
        initP2P();

        // 初期表示タブの調整
        setTimeout(() => {
            const highlight = document.getElementById('tab-highlight');
            const activeTab = document.querySelector('.tab.active');
            if(activeTab) {
                highlight.style.width = activeTab.offsetWidth + 'px';
                highlight.style.transform = `translateX(${activeTab.offsetLeft - 6}px)`;
            }
        }, 100);
    }
    
    function saveData() { localStorage.setItem('private_chat_data_v2', JSON.stringify(appData)); }
    window.onload = loadData;

    // ==========================================
    // 🎨 UI操作・テーマ
    // ==========================================
    function switchTab(id, tabElement) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        
        tabElement.classList.add('active');
        document.getElementById(id).classList.add('active');
        
        const highlight = document.getElementById('tab-highlight');
        highlight.style.width = tabElement.offsetWidth + 'px';
        highlight.style.transform = `translateX(${tabElement.offsetLeft - 6}px)`;

        if (id === 'tab-p2p') scrollChatBottom('p2p-chat-box');
        if (id === 'tab-ai') scrollChatBottom('ai-chat-box');
    }

    function applyTheme() {
        document.body.setAttribute('data-theme', appData.theme);
        document.documentElement.style.setProperty('--chat-fs', appData.chatFontSize + 'px');
    }
    function changeTheme(name) { appData.theme = name; saveData(); applyTheme(); }
    
    function applySettingsUI() {
        document.getElementById('app-title-display').innerText = appData.chatTitle || 'プライベートチャット';
    }

    function changeChatFontSize(delta) {
        let size = appData.chatFontSize + delta;
        if (size < 12) size = 12;
        if (size > 24) size = 24;
        appData.chatFontSize = size;
        saveData(); applyTheme();
    }

    function loadBackgroundImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                    const max = 1500; let scale = max / Math.max(img.width, img.height);
                    if (scale > 1) scale = 1; c.width = img.width * scale; c.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, c.width, c.height);
                    appData.backgroundImage = c.toDataURL('image/jpeg', 0.6); saveData(); applyBackgroundImage();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
    function clearBackgroundImage() { appData.backgroundImage = null; saveData(); applyBackgroundImage(); }
    function applyBackgroundImage() {
        if (appData.backgroundImage) document.documentElement.style.setProperty('--bg-img', `url(${appData.backgroundImage})`);
        else document.documentElement.style.setProperty('--bg-img', 'none');
    }

    function hardResetApp() {
        if(confirm("【⚠️警告】\nすべての履歴、画像、連絡先設定を消去して初期状態に戻します。\n本当によろしいですか？")) {
            localStorage.removeItem('private_chat_data_v2');
            location.reload();
        }
    }

    function clearChatLog(type) {
        if(confirm("このチャットの履歴をすべて消去しますか？（取り消せません）")) {
            if (type === 'ai') {
                appData.aiHistory = [];
            } else if (type === 'p2p' && currentPartnerId) {
                appData.contacts[currentPartnerId].history = [];
            }
            saveData();
            renderChat(type);
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight < 120 ? el.scrollHeight : 120) + 'px';
    }
    function handleEnter(e, sendFunc) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendFunc();
            e.target.style.height = 'auto';
        }
    }
    function scrollChatBottom(id) {
        const box = document.getElementById(id);
        if(box) box.scrollTop = box.scrollHeight;
    }

    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function openImageViewer(src) {
        document.getElementById('img-viewer-img').src = src;
        document.getElementById('img-viewer-dl').href = src;
        openModal('img-viewer-modal');
    }

    // ==========================================
    // 📱 ワイヤレス チャット (P2P + チャンク送信)
    // ==========================================
    let peer = null;
    let conn = null;
    let p2pCurrentFile = null; 

    // ファイル受信結合用バッファ
    let receivingFiles = {}; // { fileId: { chunks: [], total: int, name: str, type: str } }

    function initP2P() {
        const prefix = "ripi-chat-v3-";
        peer = new Peer(prefix + appData.myP2pId, { config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' } ] } });
        
        peer.on('open', () => { document.getElementById('modal-my-id').innerText = appData.myP2pId; });
        peer.on('connection', (connection) => {
            conn = connection;
            // 接続されたら相手のID（プレフィックス除去）を取得
            const partnerId = conn.peer.replace(prefix, '');
            setupP2PConnection(partnerId);
        });
    }

    function handleP2PTabClick(tabEl) {
        switchTab('tab-p2p', tabEl);
        if (conn && conn.open) {
            document.getElementById('disconnect-target-name').innerText = currentPartnerId;
            openModal('p2p-disconnect-modal');
        } else {
            renderContactList();
            openModal('p2p-connect-modal');
        }
    }

    function renderContactList() {
        const listArea = document.getElementById('contact-list-area');
        listArea.innerHTML = '';
        const ids = Object.keys(appData.contacts);
        if (ids.length === 0) {
            listArea.innerHTML = '<div style="color:#888; font-size:0.9rem;">まだ履歴がありません</div>';
            return;
        }
        ids.forEach(id => {
            const data = appData.contacts[id];
            listArea.innerHTML += `
                <div class="contact-item" onclick="document.getElementById('modal-target-id').value='${id}'">
                    <span style="font-weight:bold; font-size:1.1rem;">ID: ${id}</span>
                    <span style="font-size:0.8rem; color:#666;">履歴 ${data.history ? data.history.length : 0}件</span>
                </div>
            `;
        });
    }

    function connectP2P() {
        const targetId = document.getElementById('modal-target-id').value.trim();
        if(!targetId || targetId.length !== 4) return alert('4桁の数字を入力してください');
        
        conn = peer.connect("ripi-chat-v3-" + targetId, { reliable: true });
        setupP2PConnection(targetId);
    }

    function setupP2PConnection(partnerId) {
        conn.on('open', () => {
            currentPartnerId = partnerId;
            // 連絡先に登録
            if (!appData.contacts[partnerId]) {
                appData.contacts[partnerId] = { history: [] };
                saveData();
            }
            
            // UI更新
            const tab = document.getElementById('tab-btn-p2p');
            tab.innerText = `🟢 接続中 (${partnerId})`;
            tab.classList.add('connected');
            closeModal('p2p-connect-modal');
            
            renderChat('p2p'); // 過去の履歴を描画
            
            // 相手に自分の名前を送信
            conn.send({ type: 'hello', name: appData.userName });
        });
        
        conn.on('data', (data) => {
            if (data.type === 'hello') {
                // 相手の名前を受け取ったら保存
                if(appData.contacts[partnerId]) {
                    appData.contacts[partnerId].name = data.name;
                    saveData();
                }
            }
            else if (data.type === 'chat') { receiveP2PMessage(data.payload); }
            else if (data.type === 'chunk') { handleIncomingChunk(data); }
        });
        
        conn.on('close', () => {
            disconnectP2P(true);
        });
    }

    function disconnectP2P(isRemote = false) {
        if (conn) { conn.close(); conn = null; }
        currentPartnerId = null;
        const tab = document.getElementById('tab-btn-p2p');
        tab.innerText = `📱 ワイヤレス`;
        tab.classList.remove('connected');
        closeModal('p2p-disconnect-modal');
        if (isRemote) alert('相手から通信が切断されました。');
    }

    // ── ファイルチャンク処理 ──
    function handleP2PFileSelect(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        
        const isImage = file.type.startsWith('image/');
        const reader = new FileReader();
        
        reader.onload = (e) => {
            p2pCurrentFile = {
                dataBase64: e.target.result, // 全データ
                name: file.name,
                type: file.type,
                isImage: isImage
            };
            
            const contentDiv = document.getElementById('p2p-preview-content');
            if (isImage) {
                contentDiv.innerHTML = `<img src="${e.target.result}">`;
            } else {
                contentDiv.innerHTML = `<div class="file-name">📎 ${file.name}</div>`;
            }
            document.getElementById('p2p-preview-area').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
    function removeP2PFile() {
        p2pCurrentFile = null;
        document.getElementById('p2p-preview-area').style.display = 'none';
        document.getElementById('p2p-file-input').value = "";
    }

    async function sendP2PMessage() {
        if (!conn || !conn.open) return alert('接続されていません。');

        const inputEl = document.getElementById('p2p-input-text');
        const text = inputEl.value.trim();
        
        if (!text && !p2pCurrentFile) return;

        const msgId = Date.now();
        
        // ファイルがある場合はチャンク送信を開始
        if (p2pCurrentFile) {
            const chunkSize = 64 * 1024; // 64KB
            const base64Str = p2pCurrentFile.dataBase64;
            const totalChunks = Math.ceil(base64Str.length / chunkSize);
            
            // 進行UI表示
            const progContainer = document.getElementById('progress-bar-container');
            const progFill = document.getElementById('progress-fill');
            const progText = document.getElementById('progress-text');
            progContainer.style.display = 'block';

            // 即座に自分側にはファイル付きとして表示
            const localMsg = { id: msgId, sender: appData.userName || 'ゲスト', text: text, file: p2pCurrentFile, isMine: true };
            appendMessage('p2p', localMsg);
            
            // 非同期で少しずつ送信（メインスレッドを固めないため）
            for (let i = 0; i < totalChunks; i++) {
                const chunk = base64Str.slice(i * chunkSize, (i + 1) * chunkSize);
                conn.send({
                    type: 'chunk',
                    fileId: msgId,
                    idx: i,
                    total: totalChunks,
                    data: chunk,
                    name: p2pCurrentFile.name,
                    isImage: p2pCurrentFile.isImage,
                    textPayload: (i === totalChunks - 1) ? text : null, // 最後にテキストも送る
                    senderName: appData.userName || 'ゲスト'
                });
                
                // プログレスバー更新
                let pct = Math.floor(((i+1)/totalChunks)*100);
                progFill.style.width = `${pct}%`;
                progText.innerText = `送信中... ${pct}%`;
                
                // 次のチャンクまで少し待機（PeerJSのバッファ溢れ防止）
                await new Promise(r => setTimeout(r, 10)); 
            }
            
            progContainer.style.display = 'none';
            inputEl.value = '';
            removeP2PFile();
            saveData();
            
        } else {
            // テキストのみ
            const msgObj = { id: msgId, sender: appData.userName || 'ゲスト', text: text, file: null, isMine: true };
            appendMessage('p2p', msgObj);
            conn.send({ type: 'chat', payload: { ...msgObj, isMine: false } });
            inputEl.value = '';
            saveData();
        }
    }

    function handleIncomingChunk(data) {
        // プログレス表示（受信側）
        const progContainer = document.getElementById('progress-bar-container');
        const progFill = document.getElementById('progress-fill');
        const progText = document.getElementById('progress-text');
        
        if (!receivingFiles[data.fileId]) {
            receivingFiles[data.fileId] = { chunks: new Array(data.total), received: 0 };
            progContainer.style.display = 'block';
        }

        let fileData = receivingFiles[data.fileId];
        if (!fileData.chunks[data.idx]) {
            fileData.chunks[data.idx] = data.data;
            fileData.received++;
            
            let pct = Math.floor((fileData.received / data.total) * 100);
            progFill.style.width = `${pct}%`;
            progText.innerText = `受信中... ${pct}%`;
        }

        // 全て受信完了
        if (fileData.received === data.total) {
            progContainer.style.display = 'none';
            const fullBase64 = fileData.chunks.join('');
            
            const msgObj = {
                id: data.fileId,
                sender: data.senderName,
                text: data.textPayload,
                file: { dataBase64: fullBase64, name: data.name, isImage: data.isImage },
                isMine: false
            };
            
            receiveP2PMessage(msgObj);
            delete receivingFiles[data.fileId]; // メモリ解放
        }
    }

    function receiveP2PMessage(msg) {
        msg.isMine = false;
        appendMessage('p2p', msg);
        saveData();
    }


    // ==========================================
    // 🤖 AI チャット (GPT-5.2)
    // ==========================================
    let aiCurrentImageBase64 = null;

    function handleAIImageSelect(input) {
        if (!input.files || !input.files[0]) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const c = document.createElement('canvas'); const ctx = c.getContext('2d');
                const max = 800; let scale = max / Math.max(img.width, img.height);
                if (scale > 1) scale = 1; c.width = img.width * scale; c.height = img.height * scale;
                ctx.drawImage(img, 0, 0, c.width, c.height);
                
                aiCurrentImageBase64 = c.toDataURL('image/jpeg', 0.8);
                document.getElementById('ai-img-preview').src = aiCurrentImageBase64;
                document.getElementById('ai-preview-area').style.display = 'block';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }
    function removeAIImage() {
        aiCurrentImageBase64 = null;
        document.getElementById('ai-preview-area').style.display = 'none';
        document.getElementById('ai-file-input').value = "";
    }

    async function askAI() {
        const inputEl = document.getElementById('ai-input-text');
        const text = inputEl.value.trim();
        const base64Img = aiCurrentImageBase64;

        if (!appData.openAiKey) { alert('設定タブからOpenAI APIキーを入力してください。'); return; }
        if (!text && !base64Img) return;

        const msgObj = {
            id: Date.now(),
            sender: appData.userName || 'あなた',
            text: text,
            file: base64Img ? { dataBase64: base64Img, isImage: true } : null,
            isMine: true
        };
        
        appendMessage('ai', msgObj);
        inputEl.value = '';
        removeAIImage();
        saveData();

        const loadingId = "loading-" + Date.now();
        const box = document.getElementById('ai-chat-box');
        box.innerHTML += `<div class="chat-msg other" id="${loadingId}"><div class="chat-name">GPT-5.2</div><div>💭 考え中...</div></div>`;
        scrollChatBottom('ai-chat-box');

        try {
            let contentArray = [];
            if (text) contentArray.push({ type: "text", text: text });
            else contentArray.push({ type: "text", text: "この画像について解析してください。" });
            if (base64Img) contentArray.push({ type: "image_url", image_url: { url: base64Img } });

            const messages = [
                { role: "system", content: "あなたは最新のGPT-5.2です。ユーザーの質問や画像に対して、親しみやすくかつ的確に答えてください。" },
                { role: "user", content: contentArray }
            ];

            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${appData.openAiKey}` },
                body: JSON.stringify({ model: "gpt-4o", messages: messages, max_tokens: 1500 }) 
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();
            if (data.error) throw new Error(data.error.message);

            appendMessage('ai', {
                id: Date.now(), sender: '🤖 GPT-5.2', text: data.choices[0].message.content.trim(), isMine: false
            });
            saveData();

        } catch (e) {
            document.getElementById(loadingId).innerHTML = `<div class="chat-name">⚠️ エラー</div><div>${e.message}</div>`;
        }
    }


    // ==========================================
    // 💬 チャット描画共通関数
    // ==========================================
    function renderChat(type) {
        const box = document.getElementById(`${type}-chat-box`);
        box.innerHTML = '';
        
        let history = [];
        if (type === 'ai') history = appData.aiHistory;
        else if (type === 'p2p' && currentPartnerId && appData.contacts[currentPartnerId]) {
            history = appData.contacts[currentPartnerId].history;
        }

        history.forEach(msg => renderSingleMessage(box, msg));
        scrollChatBottom(`${type}-chat-box`);
    }

    function appendMessage(type, msg) {
        if (type === 'ai') {
            appData.aiHistory.push(msg);
        } else if (type === 'p2p' && currentPartnerId) {
            appData.contacts[currentPartnerId].history.push(msg);
        }
        
        const box = document.getElementById(`${type}-chat-box`);
        renderSingleMessage(box, msg);
        scrollChatBottom(`${type}-chat-box`);
    }

    function renderSingleMessage(box, msg) {
        const div = document.createElement('div');
        div.className = `chat-msg ${msg.isMine ? 'user' : 'other'}`;
        
        let innerHtml = `<div class="chat-name">${msg.sender}</div>`;
        if (msg.text) {
            const safeText = msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            innerHtml += `<div>${safeText}</div>`;
        }
        
        if (msg.file) {
            if (msg.file.isImage) {
                // 画像タップでビューアーを開く
                innerHtml += `<img class="chat-image" src="${msg.file.dataBase64}" onclick="openImageViewer('${msg.file.dataBase64}')">`;
            } else {
                innerHtml += `<a class="chat-file-link" href="${msg.file.dataBase64}" download="${msg.file.name}">📥 ${msg.file.name} を保存</a>`;
            }
        }
        
        div.innerHTML = innerHtml;
        box.appendChild(div);
    }
</script>

</body>
</html>
