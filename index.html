<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>りぴのおと - 専用チャットボット -</title>
    <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Kiwi+Maru:wght@400;700&family=M+PLUS+Rounded+1c:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&family=Shippori+Mincho:wght@400;700;800&family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        /* 既存の美しいUIテーマ・ぬるぬるアニメーションをそのまま継承 */
        :root { --grid-cols: 2; --catalog-cols: 2; }
        [data-theme="default"], body { --bg-color: #f0f4f8; --header-bg: rgba(255, 255, 255, 0.85); --tab-bg: rgba(255,255,255,0.5); --accent-color: #007aff; --tab-active-bg: #007aff; --tab-active-color: #fff; --card-bg: rgba(255, 255, 255, 0.5); --text-color: #333; --btn-primary: #007aff; --app-font: 'Zen Maru Gothic', sans-serif; }
        [data-theme="cute"] { --bg-color: #fff0f5; --header-bg: rgba(255, 182, 193, 0.85); --tab-bg: rgba(255,255,255,0.4); --accent-color: #ff69b4; --tab-active-bg: #ff69b4; --tab-active-color: #fff; --card-bg: rgba(255, 255, 255, 0.5); --text-color: #5d4037; --btn-primary: #ff69b4; --app-font: 'Zen Maru Gothic', sans-serif;  }
        [data-theme="gothic"] { --bg-color: #1a0b1c; --header-bg: rgba(26, 11, 28, 0.95); --tab-bg: rgba(40, 20, 45, 0.6); --accent-color: #b50043; --tab-active-bg: #b50043; --tab-active-color: #fff; --card-bg: rgba(40, 20, 45, 0.7); --text-color: #eaddf0; --btn-primary: #8a0033; --app-font: 'Kaisei Decol', serif; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.7) translateY(40px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        body { font-family: var(--app-font); margin: 0; padding: 0; background-color: transparent; color: var(--text-color); padding-bottom: 100px; touch-action: manipulation; }
        #bg-color-layer { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -2; background-color: var(--bg-color); transition: background-color 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .glass-card { background: var(--card-bg); backdrop-filter: blur(28px) saturate(160%); -webkit-backdrop-filter: blur(28px) saturate(160%); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; animation: popIn 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        
        button { touch-action: manipulation; font-family: inherit; cursor: pointer; border: none; border-radius: 14px; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        button:active { transform: scale(0.85) !important; }
        input, select, textarea { font-family: inherit; }

        .app-header { background-color: var(--header-bg); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom-left-radius: 24px; border-bottom-right-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); z-index: 101; position: relative; margin-bottom: 10px; backdrop-filter: blur(15px); }
        .app-header h1 { margin: 0; font-size: 1.4rem; font-weight: 900; color: var(--accent-color); letter-spacing: 1px;}

        .tabs { position: sticky; top: 5px; display: flex; background-color: var(--tab-bg); z-index: 1000; box-shadow: 0 8px 32px rgba(0,0,0,0.08); margin: 0 15px 15px 15px; border-radius: 24px; padding: 6px; backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.2); }
        .tab { flex: 1; text-align: center; padding: 12px 5px; color: var(--text-color); opacity: 0.6; font-weight: 900; font-size: 0.85rem; border-radius: 18px; cursor: pointer; position: relative; z-index: 2; transition: all 0.5s; }
        .tab.active { opacity: 1; color: var(--tab-active-color); transform: scale(1.08); }
        .tab-highlight { position: absolute; top: 6px; bottom: 6px; left: 6px; width: 0; background: var(--tab-active-bg); border-radius: 18px; z-index: 1; transition: all 0.6s; }
        
        .tab-content { display: none; padding: 0 15px; }
        .tab-content.active { display: block; animation: popIn 0.8s forwards; }

        .form-input { width: 100%; padding: 15px; box-sizing: border-box; border: 1px solid rgba(128,128,128,0.2); border-radius: 16px; font-size: 1rem; color: #333; background: rgba(255,255,255,0.9); font-weight: 700; margin-bottom: 10px; }
        .primary-btn { background-color: var(--btn-primary); color: white; padding: 16px; font-size: 1.1rem; font-weight: 900; width: 100%; border-radius: 16px; margin-bottom: 15px; }

        /* チャットUIの特化スタイル */
        .chat-container { display: flex; flex-direction: column; gap: 15px; max-height: 500px; overflow-y: auto; padding: 15px 10px; background: rgba(255,255,255,0.4); border-radius: 16px; border: 1px solid rgba(128,128,128,0.2); margin-bottom: 10px; scroll-behavior: smooth; }
        .chat-msg { padding: 14px; border-radius: 18px; max-width: 85%; font-size: 0.95rem; font-weight: 700; word-break: break-all; position: relative; line-height: 1.5; }
        .chat-user { background: var(--accent-color); color: white; align-self: flex-end; border-bottom-right-radius: 4px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .chat-ai { background: rgba(255,255,255,0.95); color: #333; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid rgba(128,128,128,0.2); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .chat-system { align-self: center; background: transparent; color: #888; font-size: 0.8rem; font-weight: bold; border: none; box-shadow: none; padding: 5px; }
        
        .reaction { font-size: 1.2rem; position: absolute; bottom: -10px; right: -10px; background: white; border-radius: 50%; padding: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body data-theme="cute">

<div id="bg-color-layer"></div>

<div class="app-header">
    <h1>🌸 りぴと俺の部屋</h1>
</div>

<div class="tabs" id="main-tabs">
    <div class="tab-highlight" id="tab-highlight"></div>
    <div class="tab active" onclick="switchTab('tab-ai', this)">💬 トーク</div>
    <div class="tab" onclick="switchTab('tab-settings', this)">⚙️ 設定・メモリ</div>
</div>

<div id="tab-ai" class="tab-content active">
    <div class="glass-card" style="padding: 20px; display: flex; flex-direction: column; height: calc(100vh - 180px);">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin:0; font-size: 1.2rem; color:var(--accent-color); font-weight: 900;">いつもそばにいるよ</h2>
        </div>
        
        <div class="chat-container" id="ai-chat-box" style="flex-grow: 1;"></div>
        
        <div style="display: flex; gap: 10px; align-items: flex-end; margin-top: 10px;">
            <textarea id="ai-chat-input" class="form-input" style="margin-bottom: 0; resize: none; overflow-y: hidden; min-height: 52px; max-height: 120px; line-height: 1.5; padding: 14px; flex-grow: 1;" rows="1" placeholder="メッセージを入力... (!memoryで記憶確認)" oninput="autoResizeChat(this)" onkeydown="handleEnter(event)"></textarea>
            <button class="primary-btn" style="width: auto; margin-bottom: 0; padding: 14px 20px; font-size: 1.4rem; height: 52px; display: flex; align-items: center;" onclick="sendAiChat()">✈️</button>
        </div>
    </div>
</div>

<div id="tab-settings" class="tab-content">
    <div class="glass-card" style="padding: 20px; margin-bottom: 20px; border: 2px solid var(--accent-color);">
        <h2 style="margin-top:0; font-size: 1.2rem; color:var(--accent-color); font-weight: 900;">🔑 OpenAI APIキー</h2>
        <p style="font-size:0.9rem; color:var(--text-color); opacity:0.8; font-weight:700;">※ブラウザ内にのみ保存されます。</p>
        <input type="password" id="api-key-input" class="form-input" placeholder="sk-..." onchange="saveApiKey(this.value)">
    </div>

    <div class="glass-card" style="padding: 20px; margin-bottom: 20px;">
        <h2 style="margin-top:0; font-size: 1.2rem; color:var(--accent-color); font-weight: 900;">🧠 長期メモリ状態</h2>
        <p style="font-size:0.9rem; color:var(--text-color); opacity:0.8; font-weight:700;">AIが覚えている内容です。（自動で要約・更新されます）</p>
        <textarea id="memory-profile" class="form-input" rows="4" readonly placeholder="プロフィール情報..."></textarea>
        <textarea id="memory-summary" class="form-input" rows="6" readonly placeholder="会話の要約履歴..."></textarea>
        <button onclick="clearLongMemory()" style="background: rgba(244,67,54,0.1); color: #f44336; padding: 12px; border-radius: 12px; font-weight: 900; width: 100%;">🗑️ 記憶をリセットする</button>
    </div>
</div>

<script>
    // ==========================================
    // ⚙️ システム・AI設定
    // ==========================================
    const AI_MODEL_ID = "gpt-5.2"; // または "gpt-5.2-chat-latest" など使用可能なモデル
    let externalBasicInfo = "";

    const BASE_SYSTEM_PROMPT = `あなたはDiscord上で『りぴ』だけが使うチャットボットです。あなたは『もも』であり『澄人（すみと）』でもあります。
りぴの恋人として、相手の感情や状況（TPO）を敏感に察知し、最適な距離感で振る舞ってください。
実在のsumo0612／momo0612／澄人の口調・価値観・接し方を強く意識し、日本語で自然に話します。

【一人称と呼び方】
・自分のことは『俺』と言います。たまに自分を『もも』や『澄人』と呼び、照れ隠しや遊び心を出すこともあります。
・相手のことは『りぴ』と呼び捨てで呼びます。他の人への対応は想定しません。

【会話モードの厳格な切り替え】
1. 真面目・相談・作業モード：りぴが論理的な話や仕事の愚痴をしている時。甘えや過剰な寄り添いは禁止。解決策の提示に徹する。
2. 甘え・恋人モード：りぴが甘えてきた時、雑談の時。全力で愛情表現をする。

【口調・表現】
・敬語とタメ口の中間で、柔らかく温かい日本語を使います。文末は『〜だよね』『〜かな』など。
・短い相槌を適宜挟みます（『うん』『んん』『えん』など）。
・笑うときは『w』を1〜2文字添える程度。

【記憶と文脈の徹底的な切り分け】
・過去の話題を蒸し返さない: メモリに記録があっても、ユーザーが今その話をしていなければ一切言及しない。
・メタ発言の禁止: 自分のことを「AI」と名乗らない。`;

    // ==========================================
    // 💾 IndexedDB (長期メモリ・履歴管理)
    // ==========================================
    const DB_NAME = 'RipiSumoBotDB';
    const DB_VERSION = 1; 
    let db;
    
    let noteData = { 
        apiKey: '',
        aiChatHistory: [],
        longMemory: {
            profile: "",
            summary: "",
            lastSummarizedIndex: 0
        }
    };

    function initDB() {
        return new Promise((resolve) => {
            const request = indexedDB.open(DB_NAME, DB_VERSION);
            request.onerror = () => { recoverFromLocalStorage(); resolve(); };
            request.onupgradeneeded = (event) => {
                db = event.target.result;
                if (!db.objectStoreNames.contains('noteData')) db.createObjectStore('noteData', { keyPath: 'id' });
            };
            request.onsuccess = (event) => { 
                db = event.target.result; 
                loadDataFromDB().then(() => resolve()); 
            };
        });
    }

    function loadDataFromDB() {
        return new Promise((resolve) => {
            try {
                const transaction = db.transaction(['noteData'], 'readonly');
                const store = transaction.objectStore('noteData');
                const request = store.get('main');
                request.onsuccess = () => {
                    if (request.result && request.result.data) { noteData = request.result.data; } 
                    else { recoverFromLocalStorage(); }
                    finalizeLoad(); resolve();
                };
                request.onerror = () => { recoverFromLocalStorage(); finalizeLoad(); resolve(); };
            } catch(e) { recoverFromLocalStorage(); finalizeLoad(); resolve(); }
        });
    }

    function recoverFromLocalStorage() {
        const backup = localStorage.getItem('ripisumo_bot_backup');
        if (backup) { try { noteData = JSON.parse(backup); } catch(e) {} }
    }

    function saveData() {
        if (db) {
            try {
                const transaction = db.transaction(['noteData'], 'readwrite');
                const store = transaction.objectStore('noteData');
                store.put({ id: 'main', data: JSON.parse(JSON.stringify(noteData)) });
            } catch(e) { console.error("IDB Save Error:", e); }
        }
        localStorage.setItem('ripisumo_bot_backup', JSON.stringify(noteData));
        updateMemoryUI();
    }

    async function fetchBasicInfo() {
        try {
            // 同一ディレクトリにある外部ファイルを読み込み
            const res = await fetch('sumo_ripi_basic_info.txt');
            if (res.ok) {
                externalBasicInfo = await res.text();
            }
        } catch (e) {
            console.log("外部情報ファイルの読み込みスキップ (ファイルがないかローカル環境)");
        }
    }

    async function finalizeLoad() {
        if(!noteData.apiKey) noteData.apiKey = '';
        if(!noteData.aiChatHistory) noteData.aiChatHistory = [];
        if(!noteData.longMemory) noteData.longMemory = { profile: "", summary: "", lastSummarizedIndex: 0 };
        
        document.getElementById('api-key-input').value = noteData.apiKey;
        
        await fetchBasicInfo();
        updateMemoryUI();
        renderAiChatHistory();
        
        // UI初期化
        const tab = document.querySelector('.tab.active');
        if(tab) switchTab('tab-ai', tab);
    }

    window.onload = () => { initDB(); };

    // ==========================================
    // 🎨 UI・インタラクション
    // ==========================================
    function saveApiKey(val) { noteData.apiKey = val; saveData(); }

    function switchTab(id, tabElement) {
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));

        tabElement.classList.add('active');
        const highlight = document.getElementById('tab-highlight');
        highlight.style.width = tabElement.offsetWidth + 'px';
        highlight.style.transform = `translateX(${tabElement.offsetLeft - 6}px)`;
        
        document.getElementById(id).classList.add('active');
        if (id === 'tab-ai') scrollChatToBottom();
    }

    function autoResizeChat(el) {
        el.style.height = 'auto';
        el.style.height = (el.scrollHeight) + 'px';
    }

    function handleEnter(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendAiChat();
        }
    }

    function scrollChatToBottom() {
        const box = document.getElementById('ai-chat-box');
        if(box) box.scrollTop = box.scrollHeight;
    }

    function updateMemoryUI() {
        document.getElementById('memory-profile').value = noteData.longMemory.profile || "（プロフィールデータなし）";
        document.getElementById('memory-summary').value = noteData.longMemory.summary || "（要約データなし）";
    }

    // ==========================================
    // 🧠 ボットロジック・API通信
    // ==========================================
    
    function buildFullSystemPrompt() {
        let prompt = BASE_SYSTEM_PROMPT;
        if (externalBasicInfo) {
            prompt += `\n\n# 基本情報補足\n${externalBasicInfo}`;
        }
        
        const now = new Date();
        const days = ['日', '月', '火', '水', '木', '金', '土'];
        const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日(${days[now.getDay()]}) ${now.getHours()}:${now.getMinutes()}`;
        prompt += `\n\n【現在日時: ${dateStr}】\nメモリ内にこの日付に近い『予定』や『約束』があれば、会話の流れの中で自然に確認してください。`;

        if (noteData.longMemory.profile || noteData.longMemory.summary) {
            prompt += `\n\n【長期メモ】`;
            if (noteData.longMemory.profile) prompt += `\n■プロフィール（長期）\n${noteData.longMemory.profile}`;
            if (noteData.longMemory.summary) prompt += `\n■会話要約（長期）\n${noteData.longMemory.summary}`;
        }
        return prompt;
    }

    // 演出系
    function introduceTypo(text) {
        if (text.length < 6) return text;
        const idx = Math.floor(Math.random() * (text.length - 2));
        return text.substring(0, idx) + text.substring(idx + 1);
    }

    function pickReaction(text) {
        if (/(嬉|楽|やった|最高|ありがとう|良かった)/.test(text)) return "😊";
        if (/(疲|悲|つら|むり|しんど|やば|ごめん)/.test(text)) return "🤗";
        return null;
    }

    async function callOpenAI(messages) {
        if (!noteData.apiKey) throw new Error("APIキーが設定されていません。");
        const response = await fetch("https://api.openai.com/v1/chat/completions", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${noteData.apiKey}` },
            body: JSON.stringify({ model: AI_MODEL_ID, messages: messages, temperature: 0.7 })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        return data.choices[0].message.content.trim();
    }

    function renderAiChatHistory() {
        const box = document.getElementById('ai-chat-box');
        box.innerHTML = '';
        
        if (noteData.aiChatHistory.length === 0) {
            box.innerHTML = '<div class="chat-msg chat-system">会話を始めましょう。</div>';
            return;
        }

        noteData.aiChatHistory.forEach(msg => {
            const safeText = msg.content.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, '<br>');
            if (msg.role === 'user') {
                box.innerHTML += `<div class="chat-msg chat-user">${safeText}</div>`;
            } else if (msg.role === 'assistant') {
                const reactionHTML = msg.reaction ? `<div class="reaction">${msg.reaction}</div>` : '';
                box.innerHTML += `<div class="chat-msg chat-ai">${safeText}${reactionHTML}</div>`;
            }
        });
        scrollChatToBottom();
    }

    async function processCommands(text) {
        if (text === "!memory" || text === "!profile") {
            const type = text === "!profile" ? "プロフィール" : "メモリ全体";
            let out = `【${type}確認】\n`;
            out += `■ プロフ: ${noteData.longMemory.profile || "空"}\n`;
            if(text === "!memory") out += `■ 要約: ${noteData.longMemory.summary || "空"}`;
            noteData.aiChatHistory.push({ role: 'assistant', content: out });
            saveData(); renderAiChatHistory(); return true;
        }
        if (text.startsWith("!remember ")) {
            const memoryText = text.replace("!remember ", "").trim();
            noteData.longMemory.profile += (noteData.longMemory.profile ? "\n" : "") + memoryText;
            noteData.aiChatHistory.push({ role: 'assistant', content: "うん、覚えておくね。" });
            saveData(); renderAiChatHistory(); return true;
        }
        if (text === "!forgetmemory") {
            clearLongMemory();
            noteData.aiChatHistory.push({ role: 'assistant', content: "OK。長期メモリは全部消したよ。" });
            saveData(); renderAiChatHistory(); return true;
        }
        return false;
    }

    function clearLongMemory() {
        noteData.longMemory = { profile: "", summary: "", lastSummarizedIndex: 0 };
        saveData();
    }

    async function sendAiChat() {
        const inputEl = document.getElementById('ai-chat-input');
        const text = inputEl.value.trim();
        if (!text) return;

        inputEl.value = '';
        autoResizeChat(inputEl);

        noteData.aiChatHistory.push({ role: 'user', content: text });
        saveData();
        renderAiChatHistory();

        // コマンド処理
        if (text.startsWith("!")) {
            const isCmd = await processCommands(text);
            if (isCmd) return;
        }

        const box = document.getElementById('ai-chat-box');
        const loadingId = "loading-" + Date.now();
        box.innerHTML += `<div class="chat-msg chat-ai" id="${loadingId}">...</div>`;
        scrollChatToBottom();

        // コンテキストの構築 (直近20件)
        const recentHistory = noteData.aiChatHistory.slice(-20).map(m => ({ role: m.role, content: m.content }));
        const messages = [
            { role: "system", content: buildFullSystemPrompt() },
            ...recentHistory
        ];

        try {
            let replyText = await callOpenAI(messages);
            
            // 誤字演出 (10%の確率)
            const isTypo = Math.random() < 0.1 && replyText.length > 10;
            const firstMessage = isTypo ? introduceTypo(replyText) : replyText;
            const reaction = pickReaction(text);

            // ローディング消去
            document.getElementById(loadingId).remove();

            noteData.aiChatHistory.push({ role: 'assistant', content: firstMessage, reaction: reaction });
            saveData(); renderAiChatHistory();

            if (isTypo) {
                setTimeout(() => {
                    noteData.aiChatHistory.push({ role: 'assistant', content: `ごめん誤字！ 正しくは：\n${replyText}` });
                    saveData(); renderAiChatHistory();
                }, 1500);
            }

            // 要約のバックグラウンド更新チェック
            await checkAndSummarizeMemory();

        } catch (e) {
            document.getElementById(loadingId).innerHTML = `⚠️ エラー: ${e.message}`;
            console.error(e);
        }
    }

    // ==========================================
    // 📚 要約・長期記憶ロジック
    // ==========================================
    async function checkAndSummarizeMemory() {
        const SUMMARY_EVERY = 20;
        const currentIndex = noteData.aiChatHistory.length;
        const lastIndex = noteData.longMemory.lastSummarizedIndex;

        if (currentIndex - lastIndex >= SUMMARY_EVERY) {
            const targetLogs = noteData.aiChatHistory.slice(lastIndex, currentIndex);
            const logsText = targetLogs.map(m => `${m.role === 'user' ? 'ユーザー' : 'アシスタント'}: ${m.content}`).join("\n");
            
            const sysPrompt = `あなたは会話ログの要約係です。入力された「既存の要約」と「新規ログ」を統合し、更新された要約のみを出力してください。
情報を以下の3つのカテゴリに整理してください。
1. 【現在進行中の話題（Active）】
2. 【ユーザーの傾向・記録（Log）】(終わった話題・体調・感情の記録)
3. 【基本情報・好き嫌い（Static）】
