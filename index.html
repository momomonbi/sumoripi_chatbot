    function getNonOverlappingCanvasPos(parentId, contactNodes) {
        const parent = contactNodes.find(n => n.id === parentId);
        if(!parent) return {x: 0, y: 0};
        
        let radius = 220;
        let angle = Math.random() * Math.PI * 2;
        let px = parent.x + Math.cos(angle) * radius;
        let py = parent.y + Math.sin(angle) * radius;
        
        for(let i=0; i<15; i++) {
            let collision = false;
            for(let n of contactNodes) {
                if(n.id !== parentId && Math.hypot((n.x||0) - px, (n.y||0) - py) < 160) {
                    collision = true; break;
                }
            }
            if(!collision) break;
            angle += Math.PI / 4;
            radius += 10;
            px = parent.x + Math.cos(angle) * radius;
            py = parent.y + Math.sin(angle) * radius;
        }
        return {x: px, y: py};
    }

    function broadcastToRoom(targetContextId, messageObj) {
        const contact = appData.contacts[targetContextId];
        if(!contact) return;
        
        if (contact.isRoom) {
            contact.members.forEach(memberId => {
                const conn = activeConnections[memberId];
                if(conn && conn.open) conn.send(messageObj);
            });
        } else {
            const conn = activeConnections[targetContextId];
            if(conn && conn.open) conn.send(messageObj);
        }
    }

    async function sendMessage(sourceSpace) {
        try {
            if (!appData.userIcon) {
                alert("プロフィール写真を設定してください。");
                switchTab('tab-settings', document.getElementById('tab-btn-settings'));
                return;
            }

            const inputEl = sourceSpace === 'canvas' ? document.getElementById('chat-input-text') : document.getElementById('tree-input-text');
            if (!inputEl) return;
            const text = inputEl.value.trim();
            const file = currentAttachedFile;

            if (!text && !file) return;
            if (!activeContactId) return alert('ルーム・相手を開いてください');
            
            const contact = appData.contacts[activeContactId];
            if (!contact.canvasNodes) contact.canvasNodes = [];
            if (!contact.treeNodes) contact.treeNodes = [];

            const id = Date.now().toString();
            const passedReplyId = replyTargetId;

            let cx = 0, cy = 0;
            if (passedReplyId) {
                const pos = getNonOverlappingCanvasPos(passedReplyId, contact.canvasNodes);
                cx = pos.x; cy = pos.y;
            } else {
                // 返信指定がなくても他のノードと重なりにくい位置を探す
                const centerC = getCenterCoordinates('canvas');
                let foundPos = false;
                let angle = Math.random() * Math.PI * 2;
                let radius = 60;
                cx = centerC.x; cy = centerC.y;
                for(let i=0; i<30; i++) {
                    let collision = false;
                    for(let n of contact.canvasNodes) {
                        if(Math.hypot((n.x||0) - cx, (n.y||0) - cy) < 180) {
                            collision = true; break;
                        }
                    }
                    if(!collision) break;
                    angle += Math.PI / 3;
                    radius += 20;
                    cx = centerC.x + Math.cos(angle) * radius;
                    cy = centerC.y + Math.sin(angle) * radius;
                }
            }

            const canvasNode = { id, text, file, aiData: null, isMine: true, senderId: appData.myP2pId, x: cx, y: cy, parentId: passedReplyId, timestamp: Date.now(), isExpanded: false };
            const treeNode = { id, text, file, aiData: null, isMine: true, senderId: appData.myP2pId, x: 0, y: 0, parentId: passedReplyId, timestamp: Date.now(), isCollapsed: false };

            contact.canvasNodes.push(canvasNode);
            contact.treeNodes.push(treeNode);
            
            inputEl.value = ''; 
            inputEl.style.height = '44px'; 
            
            cancelReply(sourceSpace);
            if (file) removeAttachedFile();
            
            if (!passedReplyId && (!activeTreeRootId || !contact.treeNodes.find(n=>n.id===activeTreeRootId))) {
                activeTreeRootId = treeNode.id;
            }
            
            saveData();
            
            renderWorkspace('canvas');
            if (!passedReplyId || getTreeFamily(activeTreeRootId, contact.treeNodes).find(n => n.id === passedReplyId)) {
                renderWorkspace('tree');
            }
            
            broadcastToRoom(activeContactId, { type: 'new_node', payload: { space: 'canvas', node: canvasNode, groupId: contact.isRoom ? activeContactId : undefined } });
            broadcastToRoom(activeContactId, { type: 'new_node', payload: { space: 'tree', node: treeNode, groupId: contact.isRoom ? activeContactId : undefined } });

            processEmotionAndTreeAI(text, activeContactId, id, passedReplyId);
            
        } catch (error) {
            console.error("送信エラー:", error);
            alert("送信エラー: " + error.message);
        }
    }

    function getTreeFamily(rootId, allNodes) {
        if(!rootId) return [];
        const family = [];
        const queue = [rootId];
        while(queue.length > 0) {
            const curr = queue.shift();
            const node = allNodes.find(n => n.id === curr);
            if (node) {
                family.push(node);
                const children = allNodes.filter(n => n.parentId === curr).map(n => n.id);
                queue.push(...children);
            }
        }
        return family;
    }

    function getTreeRootId(nodeId, allNodes) {
        let curr = allNodes.find(n => n.id === nodeId);
        while(curr && curr.parentId) {
            const parent = allNodes.find(n => n.id === curr.parentId);
            if(!parent) break;
            curr = parent;
        }
        return curr ? curr.id : null;
    }

    function renderWorkspace(space) {
        const containerId = space === 'tree' ? 'tree-nodes-container' : 'canvas-nodes-container';
        const container = document.getElementById(containerId);
        if(!container) return;
        
        container.innerHTML = '';
        
        if(!activeContactId || !appData.contacts[activeContactId]) {
            const svg = document.getElementById(`${space}-svg-layer`);
            if(svg) { while (svg.firstChild) { svg.removeChild(svg.firstChild); } }
            return;
        }
        
        if (space === 'tree') {
            const allNodes = appData.contacts[activeContactId].treeNodes || [];
            if(allNodes.length > 0 && (!activeTreeRootId || !allNodes.find(n=>n.id===activeTreeRootId))) {
                const roots = allNodes.filter(n => !n.parentId).sort((a,b)=>a.timestamp - a.timestamp);
                if(roots.length > 0) activeTreeRootId = roots[0].id;
                else activeTreeRootId = allNodes[allNodes.length-1].id;
            }
            
            const layout = {};
            let currentY = 0;
            const startX = 0;
            
            function calcLayout(nodeId, depth) {
                const node = allNodes.find(n => n.id === nodeId);
                if(!node) return;
                layout[node.id] = { x: startX + (depth * 30), y: currentY };
                currentY += 70; 
                if (node.file) currentY += 90;
                if (node.text && node.text.length > 20) currentY += 25;

                const children = allNodes.filter(n => n.parentId === nodeId).sort((a,b)=>a.timestamp-b.timestamp);
                children.forEach(c => calcLayout(c.id, depth + 1));
            }
            if(activeTreeRootId) calcLayout(activeTreeRootId, 0);

            const family = getTreeFamily(activeTreeRootId, allNodes);
            family.forEach(n => {
                if(layout[n.id]) { n.tempX = layout[n.id].x; n.tempY = layout[n.id].y; }
                appendNodeToDOM(n, space);
            });
            drawTreeLines(family);
            
            const rootNode = allNodes.find(n => n.id === activeTreeRootId);
            if (rootNode && rootNode.treeSummary) updateSummaryPanel(rootNode.treeSummary, 'tree');
            else updateSummaryPanel("", 'tree');
            
        } else {
            const nodes = appData.contacts[activeContactId].canvasNodes || [];
            nodes.forEach(n => appendNodeToDOM(n, space));
            drawCanvasLines();
            
            if(appData.contacts[activeContactId].canvasSummary) updateSummaryPanel(appData.contacts[activeContactId].canvasSummary, 'canvas');
        }
        
        updateWorkspaceTransform(space);
    }

    function getEdgeOffset(w, h, dx, dy) {
        if (dx === 0 && dy === 0) return {x:0, y:0};
        const angle = Math.atan2(dy, dx);
        const absCos = Math.abs(Math.cos(angle));
        const absSin = Math.abs(Math.sin(angle));
        let x = w/2, y = h/2;
        if (w/2 * absSin <= h/2 * absCos) { x = w/2; y = w/2 * Math.tan(angle); } 
        else { y = h/2; x = h/2 / Math.tan(angle); }
        x = dx > 0 ? Math.abs(x) : -Math.abs(x); y = dy > 0 ? Math.abs(y) : -Math.abs(y);
        const margin = 14; const len = Math.hypot(x, y);
        x += (x/len) * margin; y += (y/len) * margin; return {x, y};
    }

        defs.innerHTML = `<marker id="dot-canvas" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6"><circle cx="5" cy="5" r="4" fill="rgba(0, 122, 255, 0.8)" /></marker>`;
        svg.appendChild(defs);
        
        const nodes = appData.contacts[activeContactId].canvasNodes || [];
        nodes.forEach(n => {
            if(n.parentId) {
                const parent = nodes.find(p => p.id === n.parentId);
                if(parent) {
                    const pEl = document.getElementById(`node-canvas-${parent.id}`);
                    const cEl = document.getElementById(`node-canvas-${n.id}`);
                    const pW = pEl ? pEl.offsetWidth : 160; const pH = pEl ? pEl.offsetHeight : 80;
                    const cW = cEl ? cEl.offsetWidth : 160; const cH = cEl ? cEl.offsetHeight : 80;
                    const px = (parent.x || 0) + pW/2; const py = (parent.y || 0) + pH/2;
                    const cx = (n.x || 0) + cW/2; const cy = (n.y || 0) + cH/2;
                    
                    const dx = cx - px; const dy = cy - py;
                    if (Math.hypot(dx, dy) < 40) return; 

                    const pOffset = getEdgeOffset(pW, pH, dx, dy);
                    const cOffset = getEdgeOffset(cW, cH, -dx, -dy); 
                    const startX = px + pOffset.x; const startY = py + pOffset.y;
                    const endX = cx + cOffset.x; const endY = cy + cOffset.y;
                    
                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${startX},${startY} C ${(startX+endX)/2},${startY} ${(startX+endX)/2},${endY} ${endX},${endY}`);
                    path.setAttribute('stroke', 'rgba(0, 122, 255, 0.5)'); path.setAttribute('stroke-width', '3');
                    path.setAttribute('stroke-dasharray', '6,6'); path.setAttribute('fill', 'none'); path.setAttribute('marker-end', 'url(#dot-canvas)'); 
                    svg.appendChild(path);
                }
            }
        });
    }

    function drawTreeLines(familyNodes) {
        const svg = document.getElementById('tree-svg-layer');
        if(!svg) return;
        while (svg.firstChild) { svg.removeChild(svg.firstChild); }
        
        familyNodes.forEach(n => {
            if(n.parentId) {
                const parent = familyNodes.find(p => p.id === n.parentId);
                if(parent) {
                    const px = (parent.tempX || 0) + 10; 
                    const py = (parent.tempY || 0) + 40; 
                    const cx = (n.tempX || 0); 
                    const cy = (n.tempY || 0) + 20;

                    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    path.setAttribute('d', `M ${px},${py} L ${px},${cy} L ${cx},${cy}`);
                    path.setAttribute('stroke', 'rgba(128, 128, 128, 0.4)'); 
                    path.setAttribute('stroke-width', '2');
                    path.setAttribute('fill', 'none');
                    svg.appendChild(path);
                }
            }
        });
    }

    async function requestSummaryAI(texts) {
        if (!appData.openAiKey || !texts) return null;
        const prompt = `以下の会話内容から全体を把握できる超要約を作成してください。
ルール:
1. 箇条書き（-や・など）は絶対に使わないこと。
2. 必ず3行の文章で出力すること。
3. 行の切れ目には改行文字 (\\n) を使用すること。
4. 横長にならないよう、1行は20文字前後にまとめること。
出力JSONフォーマット: {"summary": "1行目\\n2行目\\n3行目"}
会話内容:
${texts.substring(0, 1500)}`;

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${appData.openAiKey}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{role: "system", content: "You output strictly valid JSON."}, {role: "user", content: prompt}], response_format: { type: "json_object" } }) 
            });
            const data = await response.json();
            const updateData = JSON.parse(data.choices[0].message.content);
            return updateData.summary;
        } catch(e) { return null; }
    }

    async function refreshCanvasSummaryAI(targetContextId) {
        if(!targetContextId) return;
        const nodes = appData.contacts[targetContextId].canvasNodes || [];
        const texts = nodes.map(n => n.text).filter(t => t).join("\n");
        if(!texts) {
            appData.contacts[targetContextId].canvasSummary = ""; saveData();
            updateSummaryPanel("", 'canvas'); return;
        }
        document.querySelector('#canvas-summary-panel .ai-summary-text').innerHTML = "🔄 3行にまとめています...";
        const summary = await requestSummaryAI(texts);
        if(summary) {
            appData.contacts[targetContextId].canvasSummary = summary; saveData();
            if(activeContactId === targetContextId && currentTab === 'canvas') updateSummaryPanel(summary, 'canvas');
            broadcastToRoom(targetContextId, { type: 'update_summary', payload: { space: 'canvas', summary, groupId: activeContactId } });
        }
    }

    async function refreshTreeSummaryAI(targetContextId, rootId) {
        if(!targetContextId || !rootId) return;
        const nodes = appData.contacts[targetContextId].treeNodes || [];
        const family = getTreeFamily(rootId, nodes);
        const texts = family.map(n => n.text).filter(t => t).join("\n");
        if(!texts) { updateSummaryPanel("", 'tree'); return; }
        
        document.querySelector('#tree-summary-panel .ai-summary-text').innerHTML = "🔄 3行にまとめています...";
        const summary = await requestSummaryAI(texts);
        if(summary) {
            const rNode = nodes.find(n => n.id === rootId);
            if(rNode) rNode.treeSummary = summary; saveData();
            if(activeContactId === targetContextId && currentTab === 'tree' && activeTreeRootId === rootId) updateSummaryPanel(summary, 'tree');
            broadcastToRoom(targetContextId, { type: 'update_summary', payload: { space: 'tree', rootId, summary, groupId: activeContactId } });
        }
    }

    async function processEmotionAndTreeAI(text, targetContextId, nodeId, userAssignedParentId) {
        if (!appData.openAiKey || !text) return; 
        
        const contact = appData.contacts[targetContextId];
        // 誰の発言かもAIに伝える
        const treeContext = (contact.treeNodes || []).slice(-20).filter(n => n.id !== nodeId && n.text).map(n => {
            let sName = "自分";
            if (!n.isMine) { sName = connectionStatus[n.senderId]?.name || n.senderId; }
            return {id: n.id, sender: sName, text: n.text.substring(0,30)};
        });

        try {
            const prompt = `あなたはマインドマップ構築＆感情解析AIです。
過去の履歴(複数人の発言が含まれます): ${JSON.stringify(treeContext)}
新しい発言: "${text}"

発言の「感情・ニュアンス」を多角的に判定し、デザインパラメータを出力してください。
また、新しい発言が過去の履歴と文脈的にどう繋がるかを判断し、「parentId」を決定してください。

【自動リンク（parentId）判定のルール（厳守）】
1. 誰かへの返答や話の流れが通る場合: 履歴の中で最も適切な発言の「id」を parentId として指定し、ケーブルを繋げてください。直前の発言である必要はなく、一番文脈が合うものを選択してください。
2. 突然別の話題になったり、前の会話と明らかに異なる話をし出した場合: ケーブルを外し、独立した話題とするため parentId は「null」を指定してください。

【感情・ニュアンスごとのデザインルール（厳守）】
・喜び/楽しい/笑い: fontSizeは "1.2rem"〜"1.5rem", fontWeightは "900", fontFamilyは "M PLUS Rounded 1c" または "Yusei Magic", colorは "#ff4081" や "#ff9800"。
・悲しみ/落ち込み: fontSizeは "0.8rem"〜"0.9rem", fontWeightは "normal", fontFamilyは "Shippori Mincho", colorは "#5c6bc0" や "#757575"。
・怒り/強い主張/強調: fontSizeは "1.3rem"〜"1.6rem", fontWeightは "900", fontFamilyは "RocknRoll One" または "DotGothic16", colorは "#d32f2f" や "#e64a19"。
・驚き/興奮: fontSizeは "1.4rem"〜"1.7rem", fontWeightは "900", fontFamilyは "Yusei Magic" または "DotGothic16", colorは "#00bcd4" または "#9c27b0"。
・真面目/論理的/説明: fontSizeは "1.0rem"〜"1.1rem", fontWeightは "bold", fontFamilyは "Noto Sans JP" または "Zen Maru Gothic", colorは "#2c3e50" または "var(--text-color)"。
・感謝/尊敬/優しさ: fontSizeは "1.0rem"〜"1.15rem", fontWeightは "bold", fontFamilyは "Kaisei Decol" または "Shippori Mincho", colorは "#388e3c" または "#d81b60"。
・普通/冷静/日常: fontSizeは "1.0rem", fontWeight: "normal" または "bold", fontFamilyは "Zen Maru Gothic" または "Noto Sans JP", colorは "var(--text-color)"。

以下の厳密なJSONフォーマットで返して下さい:
{
  "formattedText": "元の発言テキストを適度な位置(15〜20文字程度)で改行(\\n)を挿入したもの。",
  "fontFamily": "[フォント名]",
  "color": "[HEXカラーコード]",
  "fontSize": "[サイズ]",
  "fontWeight": "[太さ]",
  "parentId": "関連する親ノードのID文字列（話題が別の場合は null を指定）"
}`;

            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST", headers: { "Content-Type": "application/json", "Authorization": `Bearer ${appData.openAiKey}` },
                body: JSON.stringify({ model: "gpt-4o", messages: [{role: "system", content: "You output strictly valid JSON."}, {role: "user", content: prompt}], response_format: { type: "json_object" } }) 
            });
            const data = await response.json();
            const updateData = JSON.parse(data.choices[0].message.content);
            
            const aiParentId = updateData.parentId;
            
            const cNode = contact.canvasNodes.find(n => n.id === nodeId);
            if(cNode) {
                cNode.aiData = { fontFamily: updateData.fontFamily, color: updateData.color, fontSize: updateData.fontSize, fontWeight: updateData.fontWeight, formattedText: updateData.formattedText };
                if (userAssignedParentId === null || userAssignedParentId === undefined) {
                    cNode.parentId = aiParentId;
                } else {
                    cNode.parentId = userAssignedParentId;
                }
            }

            const tNode = contact.treeNodes.find(n => n.id === nodeId);
            if(tNode) {
                tNode.aiData = { fontFamily: updateData.fontFamily, color: updateData.color, fontSize: updateData.fontSize, fontWeight: updateData.fontWeight, formattedText: updateData.formattedText };
                if (userAssignedParentId === null || userAssignedParentId === undefined) {
                    tNode.parentId = aiParentId;
                } else {
                    tNode.parentId = userAssignedParentId;
                }
            }
            saveData();

            broadcastToRoom(targetContextId, { type: 'update_node', payload: { space: 'canvas', node: cNode, groupId: activeContactId } });
            broadcastToRoom(targetContextId, { type: 'update_node', payload: { space: 'tree', node: tNode, groupId: activeContactId } });

            if(activeContactId === targetContextId) renderWorkspace(currentTab);
            
            refreshCanvasSummaryAI(targetContextId);
            const rId = getTreeRootId(nodeId, contact.treeNodes) || nodeId;
            refreshTreeSummaryAI(targetContextId, rId);

        } catch(e) { console.error("AI解析エラー:", e); }
    }
</script>
